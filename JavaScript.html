  let pendingTxData = null;
  let pendingTxExtra = null;

  function previewTransaksi() {
    const cName = document.getElementById("custName").value.trim();
    const wa = document.getElementById("custWA").value.trim();
    const method = document.getElementById("payMethod").value;
    const rawTotal = document
      .getElementById("totalHarga")
      .innerText.replace(/\./g, "");
    const catatan = document.getElementById("catatanTrx").value.trim();

    if (!cName || currentCart.length === 0) {
      showToast("Lengkapi nama pelanggan dan keranjang!", "error");
      return;
    }

    // [P2] Validasi format nomor WhatsApp
    if (wa && !/^[0-9]{10,15}$/.test(wa.replace(/[\s\-\+]/g, ""))) {
      showToast("Format nomor WhatsApp tidak valid!", "error");
      return;
    }

    let isDP = document.getElementById("checkDP").checked && method !== "Nanti";
    let dpAmount = parseInt(document.getElementById("inputDP").value) || 0;
    let terbayar = 0;
    let statusPay = "Belum Lunas";

    if (method === "Nanti") {
      terbayar = 0;
      statusPay = "Belum Lunas";
    } else {
      if (isDP) {
        if (dpAmount <= 0) {
          showToast("Nominal DP tidak boleh kosong!", "error");
          return;
        }
        if (dpAmount >= parseInt(rawTotal)) {
          isDP = false;
          terbayar = parseInt(rawTotal);
          statusPay = "Lunas";
        } // if DP >= total, it's Lunas
        else {
          terbayar = dpAmount;
          statusPay = "DP";
        }

        if (method === "Tunai") {
          const uang =
            parseInt(document.getElementById("inputUang").value) || 0;
          if (uang < terbayar) {
            showToast("Uang tunai kurang dari nominal DP!", "error");
            return;
          }
        }
      }
      if (!isDP) {
        terbayar = parseInt(rawTotal);
        statusPay = "Lunas";
        if (method === "Tunai") {
          const uang =
            parseInt(document.getElementById("inputUang").value) || 0;
          if (uang < terbayar) {
            showToast("Uang tunai kurang dari total!", "error");
            return;
          }
        }
      }
    }

    if (method === "QRIS") {
      if (!document.getElementById("checkQRIS").checked) {
        showToast("Ceklis verifikasi QRIS dahulu!", "error");
        return;
      }
    } else if (method === "Transfer") {
      if (!document.getElementById("checkTransfer").checked) {
        showToast("Ceklis verifikasi Transfer dahulu!", "error");
        return;
      }
    }

    let maxDurasi = 0;
    currentCart.forEach((item) => {
      if (item.durasi > maxDurasi) maxDurasi = item.durasi;
    });
    const estimasiDate = new Date();
    estimasiDate.setDate(estimasiDate.getDate() + maxDurasi);

    pendingTxData = {
      customer: cName,
      items_json: JSON.stringify(currentCart),
      estimasi: estimasiDate.toISOString(),
      total: rawTotal,
      tanggal: new Date().toISOString(),
      whatsapp: wa,
      metode_pembayaran: method,
      status_pembayaran: statusPay,
      kasir: currentUser.nama,
      catatan: catatan,
      terbayar: terbayar,
    };
    pendingTxExtra = { items: currentCart };

    // Build confirm summary
    const subtotal = document.getElementById("textSubtotal").innerText;
    let summaryHtml = `
            <div class="flex justify-between items-center py-3 px-4 border-b border-slate-100"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Pelanggan</span><span class="text-sm font-bold text-slate-800">${escapeHTML(cName)}</span></div>
            <div class="flex justify-between items-center py-3 px-4 border-b border-slate-100"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">WhatsApp</span><span class="text-sm font-bold text-slate-800">${escapeHTML(wa) || "-"}</span></div>
            <div class="px-4 py-3 border-b border-slate-100 bg-slate-50"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-2">Keranjang Layanan</span>`;

    currentCart.forEach((item) => {
      summaryHtml += `<div class="flex justify-between items-center py-1"><span class="text-xs font-semibold text-slate-700">${escapeHTML(item.paket)} (${item.berat} ${escapeHTML(item.satuan)})</span><span class="text-xs font-bold text-slate-800">Rp ${item.subtotal.toLocaleString("id-ID")}</span></div>`;
    });

    summaryHtml += `</div>`;
    summaryHtml += `
            <div class="flex justify-between items-center py-4 px-4 bg-blue-600 text-white"><span class="text-[10px] font-black uppercase tracking-widest">Total Bayar</span><span class="text-xl font-black">Rp ${rawTotal.replace(/\B(?=(\d{3})+(?!\d))/g, ".")}</span></div>`;

    if (terbayar > 0 && terbayar < parseInt(rawTotal)) {
      summaryHtml += `
            <div class="flex justify-between items-center py-3 px-4 border-b border-slate-100 bg-red-50"><span class="text-[10px] font-bold text-red-500 uppercase tracking-wider">Sisa Tagihan</span><span class="text-sm font-black text-red-600">Rp ${(parseInt(rawTotal) - terbayar).toLocaleString("id-ID")}</span></div>
            <div class="flex justify-between items-center py-3 px-4 border-b border-slate-100"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Dibayar (DP)</span><span class="text-sm font-bold text-slate-800">Rp ${terbayar.toLocaleString("id-ID")}</span></div>`;
    }

    summaryHtml += `
            <div class="flex justify-between items-center py-3 px-4 border-b border-slate-100"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Metode Bayar</span><span class="text-sm font-bold text-slate-800">${escapeHTML(method)} (${escapeHTML(statusPay)})</span></div>`;
    if (catatan) {
      summaryHtml += `<div class="flex justify-between items-start py-3 px-4"><span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider pt-0.5">Catatan</span><span class="text-sm font-semibold text-blue-600 text-right max-w-[60%]">${escapeHTML(catatan)}</span></div>`;
    }

    document.getElementById("confirmSummary").innerHTML = summaryHtml;
    const modal = document.getElementById("confirmModal");
    const content = document.getElementById("confirmModalContent");
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    setTimeout(() => {
      content.classList.remove("scale-95");
      content.classList.add("scale-100");
    }, 10);
  }

  function closeConfirmModal() {
    const modal = document.getElementById("confirmModal");
    const content = document.getElementById("confirmModalContent");
    content.classList.remove("scale-100");
    content.classList.add("scale-95");
    setTimeout(() => {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }, 200);
  }

  function confirmSubmitTransaksi() {
    // [P0] Double-submit prevention
    if (isSubmitting || !pendingTxData) return;
    isSubmitting = true;
    closeConfirmModal();
    showLoading(true);
    const d = pendingTxData;
    const extra = pendingTxExtra;
    google.script.run
      .withSuccessHandler(function (res) {
        isSubmitting = false;
        showLoading(false);
        if (res && res.success) {
          playNotifSound(); // [OPT] Notifikasi suara
          showToast("Transaksi berhasil disimpan!", "success");
          clearDraft(); // [OPT] Hapus draft setelah berhasil simpan
          lastTransactionData = {
            ...d,
            items: extra.items,
            id: res.id,
            tanggal: res.tanggal,
            total: res.total,
            subtotal: res.subtotal,
            status_pembayaran: res.status_pembayaran || d.status_pembayaran,
          };
          resetFormTransaksi();

          // [Pendekatan 1: Silent Re-fetching] Refresh data secara background
          loadTransactions(true);
          fetchCustomers();

          // Ubah redirect setelah tutup nota ke 'history' agar auto-refresh terlihat jelas
          notaOpenedFrom = "history";
          openNota();
        } else {
          showToast(res ? res.message : "Gagal diproses!", "error");
        }
      })
      .withFailureHandler(function (err) {
        isSubmitting = false;
        showLoading(false);
        showToast("Koneksi gagal, silakan coba lagi.", "error");
      })
      .createTransaction(currentUser.token, d);
    pendingTxData = null;
    pendingTxExtra = null;
  }

  // 10. CETAK NOTA
  function openNota() {
    if (!lastTransactionData) return;
    const d = new Date(lastTransactionData.tanggal);
    const est = new Date(lastTransactionData.estimasi);
    document.getElementById("printNotaTitle").innerText = escapeHTML(
      appSettings.nota_title,
    );
    document.getElementById("printNotaSubtitle").innerText = escapeHTML(
      appSettings.nota_subtitle,
    );
    document.getElementById("printNotaFooter").innerText = escapeHTML(
      appSettings.nota_footer,
    );
    document.getElementById("notaId").innerText = escapeHTML(
      lastTransactionData.id,
    );
    // Tata Tertib
    const ttWrap = document.getElementById("notaTatatertibWrap");
    const ttEl = document.getElementById("printNotaTatatertib");
    if (appSettings.nota_tatatertib && appSettings.nota_tatatertib.trim()) {
      ttEl.innerText = appSettings.nota_tatatertib;
      ttWrap.classList.remove("hidden");
    } else {
      ttWrap.classList.add("hidden");
    }
    document.getElementById("notaDate").innerText = !isNaN(d)
      ? d.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short",
          year: "numeric",
        }) +
        ", " +
        d.toLocaleTimeString("id-ID", { hour: "2-digit", minute: "2-digit" })
      : "-";
    document.getElementById("notaKasir").innerText = escapeHTML(
      lastTransactionData.kasir,
    );
    document.getElementById("notaCust").innerText = escapeHTML(
      lastTransactionData.customer,
    );

    let itemsHtml = ``;
    let subtotalReal = 0;
    if (lastTransactionData.items && lastTransactionData.items.length > 0) {
      lastTransactionData.items.forEach((item) => {
        itemsHtml += `
                    <div>
                        <div class="font-bold uppercase text-sm">${escapeHTML(item.paket)}</div>
                        <div class="flex justify-between text-[11px] text-slate-600 mt-1">
                            <span>${item.berat} ${escapeHTML(item.satuan)} x Rp ${parseInt(item.harga || 0).toLocaleString("id-ID")}</span>
                            <span class="font-bold">Rp ${parseInt(item.subtotal || 0).toLocaleString("id-ID")}</span>
                        </div>
                    </div>
                `;
        subtotalReal += parseInt(item.subtotal || 0);
      });
    } else {
      // Fallback for very old data
      itemsHtml = `
                <div>
                    <div class="font-bold uppercase text-sm">${escapeHTML(lastTransactionData.paket)}</div>
                    <div class="flex justify-between text-[11px] text-slate-600 mt-1">
                        <span>${lastTransactionData.berat} ${escapeHTML(lastTransactionData.satuan)} x Rp ${parseInt(lastTransactionData.hargaPerKg || 0).toLocaleString("id-ID")}</span>
                    </div>
                </div>
            `;
      subtotalReal = lastTransactionData.subtotal || lastTransactionData.total;
    }
    document.getElementById("notaItemsList").innerHTML = itemsHtml;

    document.getElementById("notaTotal").innerText =
      "Rp " + parseInt(lastTransactionData.total).toLocaleString("id-ID");
    document.getElementById("notaEstimasi").innerText = !isNaN(est)
      ? est.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short",
          year: "numeric",
        })
      : "-";

    // Catatan di Nota
    const catatanWrap = document.getElementById("notaCatatanWrap");
    const catatanEl = document.getElementById("notaCatatan");
    if (lastTransactionData.catatan) {
      catatanEl.innerText = lastTransactionData.catatan;
      catatanWrap.classList.remove("hidden");
    } else {
      catatanWrap.classList.add("hidden");
    }

    // Subtotal di Nota
    document.getElementById("notaSubtotal").innerText =
      "Rp " + subtotalReal.toLocaleString("id-ID");

    // DP logic & Reset Container
    const dpContainer = document.getElementById("notaDPContainer");
    if (dpContainer) {
      const total = parseInt(lastTransactionData.total) || 0;
      const terbayar = parseInt(lastTransactionData.terbayar) || 0;
      const nomDp = parseInt(lastTransactionData.nominal_dp) || 0;
      const nomPelunasan = parseInt(lastTransactionData.nominal_pelunasan) || 0;

      const lblDibayar = document.getElementById("lblNotaDibayar");
      const lblSisa = document.getElementById("lblNotaSisa");
      const valSisa = document.getElementById("notaSisa");

      if (terbayar > 0 && terbayar < total) {
        // SEDANG DP (Belum lunas)
        document.getElementById("notaDibayar").innerText =
          "Rp " + terbayar.toLocaleString("id-ID");
        valSisa.innerText = "Rp " + (total - terbayar).toLocaleString("id-ID");

        if (lblDibayar) lblDibayar.innerText = "Dibayar (DP)";
        if (lblSisa) lblSisa.innerText = "Sisa Tagihan";
        valSisa.parentElement.classList.remove("text-emerald-600");
        valSisa.parentElement.classList.add("text-red-500");

        dpContainer.classList.remove("hidden");
      } else if (nomDp > 0 && nomPelunasan > 0) {
        // LUNAS SETELAH DP
        document.getElementById("notaDibayar").innerText =
          "Rp " + nomDp.toLocaleString("id-ID");
        valSisa.innerText = "Rp " + nomPelunasan.toLocaleString("id-ID");

        if (lblDibayar) lblDibayar.innerText = "Uang Muka (DP)";
        if (lblSisa) lblSisa.innerText = "Pelunasan";
        valSisa.parentElement.classList.remove("text-red-500");
        valSisa.parentElement.classList.add("text-emerald-600");

        dpContainer.classList.remove("hidden");
      } else {
        dpContainer.classList.add("hidden");
      }
    }

  // 11. LAPORAN & EXPORT
  function generateReport(type, isBackground = false) {
    if (!isBackground) showLoading(true);
    currentReportType = type || currentReportType;
    
    const now = new Date();
    const lblRentang = document.getElementById("lblRentang");

    let startDate = null;
    let endDate = null;

    if (type === "today") {
      setActiveFilterBtn("btn-filter-today");
      lblRentang.innerText = "Harian";
      startDate = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
      ).toISOString();
      endDate = new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        23,
        59,
        59,
        999,
      ).toISOString();
    } else if (type === "weekly") {
      setActiveFilterBtn("btn-filter-weekly");
      lblRentang.innerText = "Mingguan";
      const weekAgo = new Date();
      weekAgo.setDate(now.getDate() - 7);
      startDate = weekAgo.toISOString();
      endDate = now.toISOString();
    } else if (type === "monthly") {
      setActiveFilterBtn("btn-filter-monthly");
      lblRentang.innerText = "Bulanan";
      startDate = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
      endDate = new Date(
        now.getFullYear(),
        now.getMonth() + 1,
        0,
        23,
        59,
        59,
        999,
      ).toISOString();
    } else {
      setActiveFilterBtn("");
      lblRentang.innerText = "Kustom";
      const startVal = document.getElementById("reportStart").value;
      const endVal = document.getElementById("reportEnd").value;
      if (!startVal && !endVal) {
        showToast("Pilih rentang tanggal terlebih dahulu!", "error");
        showLoading(false);
        return;
      }
      if (startVal) {
        const s = new Date(startVal);
        s.setHours(0, 0, 0, 0);
        startDate = s.toISOString();
      }
      if (endVal) {
        const e = new Date(endVal);
        e.setHours(23, 59, 59, 999);
        endDate = e.toISOString();
      }
    }

    // [OPT] Memanggil data langsung dari server tanpa limitasi 300 baris
    google.script.run
      .withSuccessHandler(function (data) {
        let filtered = data || [];
        currentReportData = filtered;

        const labels = [];
        const revenueData = [];
        const countData = [];
        const packageCount = {};
        const grouped = {};
        const countGrouped = {};
        const customerCount = {};
        const paymentMethodCount = {};
        let totalRev = 0;

        let startDObj = startDate ? new Date(startDate) : null;
        let endDObj = endDate ? new Date(endDate) : null;

        for (let i = 0; i < filtered.length; i++) {
          const t = filtered[i];
          const trDate = new Date(t.tanggal);
          const pDate = t.tanggal_pelunasan
            ? new Date(t.tanggal_pelunasan)
            : null;

          let dp = parseInt(t.nominal_dp || 0);
          let pelunasan = parseInt(t.nominal_pelunasan || 0);

          let trInRange =
            !isNaN(trDate) &&
            (!startDObj || trDate >= startDObj) &&
            (!endDObj || trDate <= endDObj);
          let pInRange =
            pDate &&
            !isNaN(pDate) &&
            (!startDObj || pDate >= startDObj) &&
            (!endDObj || pDate <= endDObj);

          const method = t.metode_pembayaran || "Lainnya";

          // 1. DP (masuk di tanggal nota jika dalam rentang)
          if (trInRange) {
            const dateKey = trDate.toLocaleDateString("id-ID", {
              day: "2-digit",
              month: "short",
            });
            if (dp > 0) {
              grouped[dateKey] = (grouped[dateKey] || 0) + dp;
              totalRev += dp;
              if (method !== "Nanti")
                paymentMethodCount[method] =
                  (paymentMethodCount[method] || 0) + dp;
            } else {
              grouped[dateKey] = grouped[dateKey] || 0; // Inisialisasi titik 0
            }
            countGrouped[dateKey] = (countGrouped[dateKey] || 0) + 1;

            if (t.items && typeof t.items === "string") {
              try {
                t.items = JSON.parse(t.items);
              } catch (e) {}
            }
            if (t.items && t.items.length > 0) {
              t.items.forEach((item) => {
                packageCount[item.paket] = (packageCount[item.paket] || 0) + 1;
              });
            } else {
              packageCount[t.paket] = (packageCount[t.paket] || 0) + 1;
            }

            if (t.customer)
              customerCount[t.customer] = (customerCount[t.customer] || 0) + 1;
          }

          // 2. Pelunasan (masuk di tanggal pelunasan jika dalam rentang)
          if (pInRange) {
            const pDateKey = pDate.toLocaleDateString("id-ID", {
              day: "2-digit",
              month: "short",
            });
            const methodPelunasan = t.metode_pelunasan || method;
            if (pelunasan > 0) {
              grouped[pDateKey] = (grouped[pDateKey] || 0) + pelunasan;
              totalRev += pelunasan;
              if (methodPelunasan !== "Nanti")
                paymentMethodCount[methodPelunasan] =
                  (paymentMethodCount[methodPelunasan] || 0) + pelunasan;
            }
          }
        }

        const sortedKeys = Object.keys(grouped).sort(function (a, b) {
          return new Date(a) - new Date(b);
        });
        for (let i = 0; i < sortedKeys.length; i++) {
          labels.push(sortedKeys[i]);
          revenueData.push(grouped[sortedKeys[i]]);
          countData.push(countGrouped[sortedKeys[i]]);
        }

        const sortedCustomers = Object.keys(customerCount)
          .map((key) => ({ name: key, count: customerCount[key] }))
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
        const custLabels = sortedCustomers.map((c) => escapeHTML(c.name));
        const custData = sortedCustomers.map((c) => c.count);

        document.getElementById("avg-rev").innerText =
          "Rp " + Math.round(totalRev).toLocaleString("id-ID");
        updateCharts(
          labels,
          revenueData,
          countData,
          packageCount,
          custLabels,
          custData,
          paymentMethodCount,
        );
        showLoading(false);
      })
      .withFailureHandler(function (err) {
        showLoading(false);
        showToast("Gagal mengambil data laporan: " + err.message, "error");
      })
      .getReportData(currentUser.token, startDate, endDate);
  }

  // [FIX] CSV escape helper — handle koma, kutip ganda, dan newline dalam data
  function csvSafe(val) {
    if (val === null || val === undefined) return '""';
    const str = String(val);
    // Selalu wrap dengan double-quotes dan escape internal quotes
    return '"' + str.replace(/"/g, '""') + '"';
  }

  function exportToCSV() {
    if (!currentReportData || currentReportData.length === 0) {
      showToast("Tidak ada data!", "error");
      return;
    }
    let csvContent =
      "ID Transaksi,Tanggal,Customer,Paket,Jumlah/Berat,Satuan,Total (Rp),Status,Metode Bayar,Status Bayar,Kasir\n";
    for (let i = 0; i < currentReportData.length; i++) {
      const row = currentReportData[i];
      const d = new Date(row.tanggal);
      const dateStr = !isNaN(d) ? d.toLocaleString("id-ID") : "-";
      if (row.items && row.items.length > 0) {
        for (let j = 0; j < row.items.length; j++) {
          const itm = row.items[j];
          const isFirst = j === 0;
          csvContent +=
            [
              isFirst ? csvSafe(row.id) : '""',
              isFirst ? csvSafe(dateStr) : '""',
              isFirst ? csvSafe(row.customer) : '""',
              csvSafe(itm.paket),
              csvSafe(itm.berat),
              csvSafe(itm.satuan || "Kg"),
              isFirst ? csvSafe(row.total) : '""',
              isFirst ? csvSafe(row.status) : '""',
              isFirst ? csvSafe(row.metode_pembayaran) : '""',
              isFirst ? csvSafe(row.status_pembayaran) : '""',
              isFirst ? csvSafe(row.kasir) : '""',
            ].join(",") + "\n";
        }
      } else {
        csvContent +=
          [
            csvSafe(row.id),
            csvSafe(dateStr),
            csvSafe(row.customer),
            csvSafe(row.paket),
            csvSafe(row.berat),
            csvSafe(row.satuan || "Kg"),
            csvSafe(row.total),
            csvSafe(row.status),
            csvSafe(row.metode_pembayaran),
            csvSafe(row.status_pembayaran),
            csvSafe(row.kasir),
          ].join(",") + "\n";
      }
    }
    // [FIX] Tambahkan BOM untuk UTF-8 agar Excel membaca karakter Indonesia dengan benar
    const BOM = "\uFEFF";
    const link = document.createElement("a");
    link.href = URL.createObjectURL(
      new Blob([BOM + csvContent], { type: "text/csv;charset=utf-8;" }),
    );
    link.download = "Laporan_" + new Date().getTime() + ".csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    showToast("Berhasil unduh Excel!");
  }

  function updateCharts(
    labels,

    const finalLabels = labels.length ? labels : ["-"];

      ? Object.keys(packages)
      : ["Kosong"];
    const pkgData = Object.values(packages).length
      ? Object.values(packages)
      : [1];

    const trendOptions = {
      series: [
        { name: "Omzet", type: "column", data: finalRevenue },

        type: "line",
        height: "100%",

  // 12. PENGATURAN PAKET LAYANAN (CRUD)
  function fetchPaket() {
    google.script.run
      .withSuccessHandler(function (data) {
        allPackages = data || [];
        const sel = document.getElementById("selectPaket");
        if (!sel) return;
        // Hanya isi dropdown transaksi dengan layanan AKTIF
        let selHtml =
          '<option value="" disabled selected>-- Pilih Layanan --</option>';
        for (let i = 0; i < allPackages.length; i++) {
          const p = allPackages[i];
          if (p.status === "Nonaktif") continue;
          const safeSat = escapeHTML(p.satuan || "Kg");
          selHtml += `<option value="${escapeHTML(p.nama)}" data-id="${escapeHTML(p.id)}" data-harga="${p.harga}" data-satuan="${safeSat}" data-durasi="${escapeHTML(p.durasi || 0)}">${escapeHTML(p.nama)} (Rp ${parseInt(p.harga).toLocaleString("id-ID")} / ${safeSat})</option>`;
        }
        sel.innerHTML = selHtml;
        renderPaketGrid(allPackages);
      })
      .withFailureHandler(function (err) {
        showToast("Gagal memuat data layanan: " + err.message, "error");
      })
      .getPackages(currentUser.token);
  }

  function renderPaketGrid(data) {
    const list = document.getElementById("listPaket");
    if (!list) return;
    if (!data || data.length === 0) {
      list.innerHTML =
        '<div class="col-span-full text-center py-10 font-bold text-slate-400 text-sm">Belum ada layanan.</div>';
      return;
    }

    // Hitung popularitas dari allTransactions
    const popCount = {};

  function filterPaketList() {
    const q = (
      document.getElementById("searchPaket").value || ""
    ).toLowerCase();
    let filtered = allPackages.filter(function (p) {
      const matchName =
        p.nama.toLowerCase().includes(q) ||
        (p.kategori || "").toLowerCase().includes(q);
      const matchStatus =
        currentPaketFilter === "Semua" ||
        p.status === currentPaketFilter ||
        (currentPaketFilter === "Aktif" && p.status !== "Nonaktif");
      return matchName && matchStatus;
    });
    renderPaketGrid(filtered);
  }

  function setPaketFilter(f) {
    currentPaketFilter = f;
    document.querySelectorAll(".paket-filter-btn").forEach(function (b) {
      b.className =
        "paket-filter-btn px-6 py-2 rounded-lg text-[10px] sm:text-xs font-bold uppercase transition-all text-slate-500 hover:text-slate-700";
    });
    const activeMap = {
      Semua: "filter-paket-all",
      Aktif: "filter-paket-aktif",
      Nonaktif: "filter-paket-nonaktif",
    };
    if (activeMap[f]) {
      const el = document.getElementById(activeMap[f]);
      if (el)
        el.className =
          "paket-filter-btn px-6 py-2 rounded-lg text-[10px] sm:text-xs font-bold uppercase transition-all bg-white text-blue-600 shadow-sm border border-slate-200/50";
    }
    filterPaketList();
  }

  function togglePaketStatus(id, currentStatus) {
    const newStatus = currentStatus === "Nonaktif" ? "Aktif" : "Nonaktif";

      .withSuccessHandler(function (res) {
        if (res.success) {
          showToast("Status layanan diperbarui!");
          fetchPaket();
        } else {
          showToast("Gagal mengubah status.", "error");
          fetchPaket(); // rollback visual
        }
      })
      .withFailureHandler(function (err) {
        showToast("Gagal ubah status layanan: " + err.message, "error");
        fetchPaket(); // rollback visual
      })
      .updatePackageStatus(currentUser.token, id, newStatus);

  function savePaket() {
    const n = document.getElementById("newPaket").value.trim();
    const h = document.getElementById("newHarga").value.trim();
    const s = document.getElementById("newSatuan").value.trim() || "Kg";
    const d = document.getElementById("newDurasi").value.trim() || 0;
    const k = document.getElementById("newKategori").value.trim();
    const st = document.getElementById("newStatus").value || "Aktif";
    if (!n || !h || h <= 0) {
      showToast("Nama & Harga wajib diisi!", "error");
      return;
    }
    const btnSave = document.getElementById("btnSavePaket");
    const origHtml = btnSave.innerHTML;
    btnSave.disabled = true;
    btnSave.innerHTML =
      '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Menyimpan...';

    if (editingPaketId) {
      google.script.run
        .withSuccessHandler(function (res) {
          btnSave.disabled = false;
          btnSave.innerHTML = origHtml;
          if (res.success) {
            showToast("Layanan diperbarui!");
            cancelEditPaket();
            fetchPaket();
          } else {
            showToast("Gagal mengupdate!", "error");
          }
        })
        .withFailureHandler(function (err) {
          btnSave.disabled = false;
          btnSave.innerHTML = origHtml;
          showToast("Gagal: " + err.message, "error");
        })
        .updatePackage(currentUser.token, editingPaketId, n, h, d, s, k, st);

      google.script.run
        .withSuccessHandler(function (res) {

          btnSave.innerHTML = origHtml;
          if (res.success) {
            showToast("Layanan disimpan!");
            cancelEditPaket();

          btnSave.disabled = false;
          btnSave.innerHTML = origHtml;
          showToast("Gagal: " + err.message, "error");

  // 14. REPEAT ORDER (fixed: support multi-item cart + handle layanan nonaktif)
  function repeatOrder(txId) {
    let tx = null;
    for (let i = 0; i < allTransactions.length; i++) {
      if (allTransactions[i].id === txId) {
        tx = allTransactions[i];
        break;
      }
    }
    if (!tx) {
      showToast("Transaksi tidak ditemukan.", "error");
      return;
    }
    showSection("transaksi");
    setTimeout(function () {
      document.getElementById("custName").value = tx.customer || "";
      document.getElementById("custWA").value = tx.whatsapp || "";
      const sel = document.getElementById("selectPaket");

      // [FIX] Support multi-item: rebuild seluruh cart dari tx.items
      if (tx.items && tx.items.length > 0) {
        currentCart = [];
        let skippedItems = [];
        for (let k = 0; k < tx.items.length; k++) {
          const item = tx.items[k];
          // Cari layanan di dropdown aktif
          let matched = false;
          for (let j = 0; j < sel.options.length; j++) {
            const opt = sel.options[j];
            if (opt.getAttribute("data-id") === item.id || opt.value === item.paket) {
              const h = parseInt(opt.getAttribute("data-harga")) || 0;
              const sat = opt.getAttribute("data-satuan") || "Kg";
              const dur = parseInt(opt.getAttribute("data-durasi")) || 0;
              const pId = opt.getAttribute("data-id") || "";
              const berat = parseFloat(item.berat) || 0;
              currentCart.push({
                id: pId,
                paket: opt.value,
                berat: berat,
                satuan: sat,
                harga: h,
                durasi: dur,
                subtotal: h * berat,
              });
              matched = true;
              break;
            }
          }
          if (!matched) skippedItems.push(item.paket);
        }
        renderCart();
        calculateTotal();
        if (currentCart.length > 0) {
          showToast("Keranjang diisi dari transaksi sebelumnya (" + currentCart.length + " item)");
        }
        if (skippedItems.length > 0) {
          showToast('Layanan "' + skippedItems.join('", "') + '" sudah tidak aktif.', "error");
        }
      } else {
        // Fallback: single item (data lama)
        let found = false;
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === tx.paket) {
            sel.selectedIndex = i;
            found = true;
            break;
          }
        }
        if (found) {
          document.getElementById("berat").value = tx.berat || "";
          handlePaketChange();
          calculateTotal();
          showToast("Form diisi dari transaksi sebelumnya.");
        } else {
          showToast(
            'Layanan "' + (tx.paket || "") + '" sudah tidak aktif. Pilih layanan manual.',
            "error",
          );
        }
      }
    }, 400);
  }

        break;

      showToast("Transaksi tidak ditemukan.", "error");

    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === tx.paket) {
        hargaPerKg = sel.options[i].getAttribute("data-harga");
        break;
      }
    }
    if (!hargaPerKg && tx.berat > 0) {
      hargaPerKg = Math.round(parseInt(tx.total) / parseFloat(tx.berat));
    }
    lastTransactionData = {
      id: tx.id,

      customer: tx.customer,
      paket: tx.paket,
      berat: tx.berat,
      total: tx.total,

      whatsapp: tx.whatsapp,
      status_pembayaran: tx.status_pembayaran,

  document.addEventListener("keydown", function (e) {
    if (e.key === "Escape") {
      const lcm = document.getElementById("logoutConfirmModal");
      const ncm = document.getElementById("navConfirmModal");
      const cm = document.getElementById("confirmModal");
      const nm = document.getElementById("notaModal");
      const pm = document.getElementById("paymentModal");
      const dm = document.getElementById("deleteModal");
      if (lcm && !lcm.classList.contains("hidden")) {
        closeLogoutConfirmModal();
        return;
      }
      if (ncm && !ncm.classList.contains("hidden")) {
        closeNavConfirmModal();
        return;
      }
      if (cm && !cm.classList.contains("hidden")) {
        closeConfirmModal();
        return;
      }
      if (nm && !nm.classList.contains("hidden")) {
        closeNota();
        return;
      }
      if (pm && !pm.classList.contains("hidden")) {
        closePaymentModal();
        return;
      }
      if (dm && !dm.classList.contains("hidden")) {
        closeDeleteModal();
        return;
      }
    }
    if (e.ctrlKey && !e.shiftKey && !e.altKey) {
      if (e.key === "1") {
        e.preventDefault();
        showSection("overview");
      } else if (e.key === "2") {
        e.preventDefault();
        showSection("transaksi");
      } else if (e.key === "3") {
        e.preventDefault();
        showSection("history");
      } else if (e.key === "p" || e.key === "P") {
        const nm = document.getElementById("notaModal");
        if (nm && !nm.classList.contains("hidden")) {
          e.preventDefault();
          printNota();
        }
      }
    }
  });

    }
    google.script.run
      .withSuccessHandler(function (data) {
        if (data && data.success) {
          allUsersList = data.data;
          renderUserGrid(allUsersList);
        } else {
          showToast(data ? data.message : "Gagal mengambil data pegawai", "error");
        }
      })
      .withFailureHandler(function (err) {
        showToast("Error koneksi: " + err.message, "error");
      })
      .getUsersList(currentUser.token);
  }

  function renderUserGrid(users) {
    const list = document.getElementById("listUsers");
    if (!list) return;
    if (!users || users.length === 0) {
      list.innerHTML = `<div class="bg-white p-8 rounded-2xl border border-slate-100 text-center shadow-sm">
        <svg class="w-12 h-12 text-slate-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <p class="text-sm font-bold text-slate-500">Belum ada data pegawai.</p>
      </div>`;
      return;
    }
    
    let html = "";
    for (let i = 0; i < users.length; i++) {
      const u = users[i];
      const roleBadge = u.role === "admin" 
        ? `<span class="bg-blue-100 text-blue-700 border border-blue-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">Admin</span>` 
        : `<span class="bg-slate-100 text-slate-600 border border-slate-200 px-2 py-0.5 rounded text-[9px] font-black uppercase tracking-widest">Kasir</span>`;
      
      const disableDelete = u.username === "admin" ? "disabled opacity-50 cursor-not-allowed" : "";
      
      html += `
        <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
          <div class="flex items-center gap-4 w-full md:w-auto">
            <div class="w-10 h-10 md:w-12 md:h-12 rounded-xl bg-blue-50 text-blue-600 flex items-center justify-center font-black text-lg flex-shrink-0">
              ${escapeHTML(u.nama.charAt(0).toUpperCase())}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center flex-wrap gap-2 mb-0.5">
                <h5 class="font-black text-slate-900 text-sm md:text-base leading-tight truncate">${escapeHTML(u.nama)}</h5>
                ${roleBadge}
              </div>
              <div class="flex items-center gap-2 text-[10px] md:text-xs font-bold text-slate-500">
                <span>@${escapeHTML(u.username)}</span>
              </div>
            </div>
          </div>
          
          <div class="flex items-center gap-2 w-full md:w-auto justify-end mt-2 md:mt-0 pt-3 md:pt-0 border-t md:border-t-0 border-slate-100">
            <button onclick="editUserUI('${escapeHTML(u.username)}', '${escapeHTML(u.nama)}', '${escapeHTML(u.role)}')" class="text-slate-400 hover:text-amber-600 bg-slate-50 hover:bg-amber-50 p-2.5 rounded-lg transition-colors border border-slate-100 shadow-sm" title="Edit Pegawai"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
            <button onclick="deleteUserUI('${escapeHTML(u.username)}')" class="text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 p-2.5 rounded-lg transition-colors border border-slate-100 shadow-sm ${disableDelete}" ${disableDelete} title="Hapus Pegawai"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
          </div>
        </div>
      `;
    }
    list.innerHTML = html;
  }

  function editUserUI(username, nama, role) {
    document.getElementById("oldUsername").value = username;
    document.getElementById("newUsername").value = username;
    // Set field username to readonly during edit
    document.getElementById("newUsername").readOnly = true;
    document.getElementById("newUsername").classList.add("bg-slate-200", "cursor-not-allowed");
    
    document.getElementById("newUserNama").value = nama;
    document.getElementById("newUserRole").value = role;
    document.getElementById("newUserPass").value = "";
    
    document.getElementById("titleUser").innerHTML = `<div class="w-2 h-6 bg-amber-500 rounded-full"></div> Edit Pegawai`;
    
    const btnSave = document.getElementById("btnSaveUser");
    btnSave.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> Update Pegawai`;
    btnSave.className = "flex-[2] bg-amber-500 hover:bg-amber-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-amber-500/20 transition-all active:scale-95 text-sm flex justify-center items-center gap-2";
    
    document.getElementById("btnCancelUser").classList.remove("hidden");
    
    const formCont = document.getElementById("formUserContainer");
    if(formCont) formCont.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function cancelEditUser() {
    document.getElementById("oldUsername").value = "";
    document.getElementById("newUsername").value = "";
    document.getElementById("newUsername").readOnly = false;
    document.getElementById("newUsername").classList.remove("bg-slate-200", "cursor-not-allowed");
    
    document.getElementById("newUserNama").value = "";
    document.getElementById("newUserRole").value = "kasir";
    document.getElementById("newUserPass").value = "";
    
    document.getElementById("titleUser").innerHTML = `<div class="w-2 h-6 bg-blue-600 rounded-full"></div> Tambah Pegawai`;
    
    const btnSave = document.getElementById("btnSaveUser");
    btnSave.innerHTML = `Simpan Pegawai`;
    btnSave.className = "flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-600/20 transition-all active:scale-95 text-sm flex justify-center items-center gap-2";
    
    document.getElementById("btnCancelUser").classList.add("hidden");
  }

  function saveUser() {
    const oldUsername = document.getElementById("oldUsername").value.trim();
    const newUsername = document.getElementById("newUsername").value.trim();
    const pass = document.getElementById("newUserPass").value;
    const nama = document.getElementById("newUserNama").value.trim();
    const role = document.getElementById("newUserRole").value;
    
    if (!newUsername || !nama) {
      showToast("Username dan Nama wajib diisi!", "error");
      return;
    }
    if (!oldUsername && !pass) {
      showToast("Password wajib diisi untuk pengguna baru!", "error");
      return;
    }
    if (newUsername.includes(" ")) {
      showToast("Username tidak boleh mengandung spasi!", "error");
      return;
    }
    
    const btnSave = document.getElementById("btnSaveUser");
    const origHtml = btnSave.innerHTML;
    btnSave.disabled = true;
    btnSave.innerHTML = '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Menyimpan...';
    
    google.script.run
      .withSuccessHandler(function(res) {
        btnSave.disabled = false;
        btnSave.innerHTML = origHtml;
        if (res.success) {
          showToast(!oldUsername ? "Pegawai baru ditambahkan!" : "Data pegawai diperbarui!");
          cancelEditUser();
          fetchUsers();
        } else {
          showToast(res.message || "Gagal menyimpan pegawai", "error");
        }
      })
      .withFailureHandler(function(err) {
        btnSave.disabled = false;
        btnSave.innerHTML = origHtml;
        showToast("Error koneksi: " + err.message, "error");
      })
      .saveUserAccount(currentUser.token, newUsername, pass, role, nama);
  }

  function deleteUserUI(username) {
    if (username === "admin") {
      showToast("Akun admin utama tidak dapat dihapus!", "error");
      return;
    }
    showDeleteModal("user", username, "Hapus Pegawai @" + username + "?");
  }
  
  function performDeleteUser(username) {
    google.script.run
      .withSuccessHandler(function(res) {
        if (res.success) {
          showToast("Pegawai berhasil dihapus!");
          if (document.getElementById("oldUsername").value === username) {
            cancelEditUser();
          }
          fetchUsers();
        } else {
          showToast(res.message || "Gagal menghapus pegawai", "error");
        }
      })
      .withFailureHandler(function(err) {
        showToast("Error koneksi: " + err.message, "error");
      })
      .deleteUserAccount(currentUser.token, username);
  }
</script>
