<script>
  // 1. VARIABEL GLOBAL
  let currentUser = null;
  let trendChart = null;
  let packageChart = null;
  let topCustomerChart = null;
  let allTransactions = [];
  let allCustomers = [];
  let allPackages = [];
  let editingPaketId = null;
  let currentReportData = [];
  let currentReportType = "today";
  let editingCustomerId = null;
  let currentPaketFilter = "Semua";
  let historyRenderLimit = 30;
  let isSubmitting = false; // [P0] Double-submit prevention
  let transactionsCacheTime = 0; // [P1] Client-side transaction cache
  const TRX_CACHE_TTL = 60000; // 1 menit TTL
  let autoRefreshInterval = null; // [OPT] Auto-refresh polling
  let draftSaveInterval = null; // [OPT] Draft auto-save
  let pendingPelunasanId = null; // [FIX] Deklarasi eksplisit — sebelumnya implicit global

  // [OPT] Notifikasi suara saat transaksi berhasil
  function playNotifSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const gain = ctx.createGain();
      gain.connect(ctx.destination);
      gain.gain.value = 0.25;
      const o1 = ctx.createOscillator();
      o1.connect(gain);
      o1.frequency.value = 800;
      o1.start();
      o1.stop(ctx.currentTime + 0.12);
      setTimeout(function () {
        const o2 = ctx.createOscillator();
        o2.connect(gain);
        o2.frequency.value = 1200;
        o2.start();
        o2.stop(ctx.currentTime + 0.12);
      }, 130);
    } catch (e) {}
  }

  // [OPT] Draft transaksi — auto-save ke localStorage
  function autoSaveDraft() {
    if (currentCart.length === 0) return;
    try {
      const draft = {
        custName: document.getElementById("custName").value,
        custWA: document.getElementById("custWA").value,
        cart: currentCart,
        catatan: document.getElementById("catatanTrx").value,
        _ts: Date.now(),
      };
      localStorage.setItem("l_premium_draft", JSON.stringify(draft));
    } catch (e) {}
  }

  function restoreDraft() {
    try {
      const raw = localStorage.getItem("l_premium_draft");
      if (!raw) return;
      const draft = JSON.parse(raw);
      if (Date.now() - draft._ts > 3600000) {
        localStorage.removeItem("l_premium_draft");
        return;
      } // expired 1 jam
      if (draft.custName)
        document.getElementById("custName").value = draft.custName;
      if (draft.custWA) document.getElementById("custWA").value = draft.custWA;
      if (draft.catatan)
        document.getElementById("catatanTrx").value = draft.catatan;
      if (draft.cart && draft.cart.length > 0) {
        currentCart = draft.cart;
        renderCart();
        calculateTotal();
        showToast("Draft transaksi dipulihkan");
      }
    } catch (e) {}
  }

  function clearDraft() {
    try {
      localStorage.removeItem("l_premium_draft");
    } catch (e) {}
  }

  let lastTransactionData = null;

  let appSettings = {
    app_name: "L-Premium",
    app_logo_url: "",
    nota_title: "L-PREMIUM",
    nota_subtitle: "Laundry Bersih & Wangi",
    nota_footer: "Terima kasih atas\nkepercayaan Anda!",
    wa_template:
      "Assalamu'alaikum, Kak *{customer}*\n\nTerima kasih telah mempercayakan cucian Anda di *{nama_toko}*.\n\n*Detail Pesanan:*\nNo. Nota  : {nota}\nLayanan   : {paket}\nJumlah    : {berat}\nTotal     : Rp {total}\nPembayaran: {status_pembayaran}\n\nEstimasi selesai: *{estimasi}*\nStatus saat ini : *{status}*\n\nKami akan menghubungi Anda kembali ketika cucian siap diambil.\nTerima kasih.",
    bank_name: "BCA",
    bank_rek: "1234",
    bank_an: "Nama",
    nota_tatatertib: "",
  };

  // 2. FUNGSI UTILITAS
  function escapeHTML(str) {
    if (!str) return "";
    return String(str).replace(
      /[&<>'"]/g,
      (tag) =>
        ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "'": "&#39;",
          '"': "&quot;",
        })[tag],
    );
  }

  function debounce(func, wait) {
    let timeout;
    return function (...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => func.apply(this, args), wait);
    };
  }

  // 3. FUNGSI AUTOCOMPLETE PELANGGAN (Ini yang sebelumnya hilang)
  function handleCustomerAutocomplete() {
    const val = document.getElementById("custName").value.toLowerCase();
    const dd = document.getElementById("customerDropdown");
    dd.innerHTML = "";
    if (val.length < 1) {
      dd.classList.add("hidden");
      return;
    }
    const matches = [];
    for (let i = 0; i < allCustomers.length; i++) {
      if (allCustomers[i].nama.toLowerCase().includes(val))
        matches.push(allCustomers[i]);
    }
    if (matches.length === 0) {
      dd.classList.add("hidden");
      return;
    }
    let htmlString = "";
    for (let i = 0; i < matches.length; i++) {
      const c = matches[i];
      const namaAman = escapeHTML(c.nama);
      const waAman = escapeHTML(c.whatsapp) || "";
      htmlString += `<div onclick="pilihPelanggan('${namaAman}', '${waAman}')" class="px-5 py-3.5 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0 transition-colors"><div class="font-bold text-slate-800 text-sm truncate">${namaAman}</div><div class="text-[10px] font-bold text-blue-500 mt-0.5">${waAman || "-"}</div></div>`;
    }
    dd.innerHTML = htmlString;
    dd.classList.remove("hidden");
  }

  function pilihPelanggan(nama, wa) {
    document.getElementById("custName").value = nama;
    document.getElementById("custWA").value = wa;
    document.getElementById("customerDropdown").classList.add("hidden");
  }

  // Pendeklarasian Debounce (Harus diletakkan setelah fungsinya ada)
  const debouncedFilterCustomer = debounce(filterCustomerList, 300);
  const debouncedFilterHistory = debounce(filterHistory, 300);
  const debouncedHandleAutocomplete = debounce(handleCustomerAutocomplete, 300);

  document.addEventListener("click", function (e) {
    const dd = document.getElementById("customerDropdown");
    if (
      dd &&
      !e.target.closest("#custName") &&
      !e.target.closest("#customerDropdown")
    ) {
      dd.classList.add("hidden");
    }
  });

  // QUICK AMOUNT BUTTONS
  // (setModalQuickAmount moved to bottom section)

  // [OPT] Session Expiry Warning
  let sessionCheckInterval = null;
  function startSessionTimer() {
    if (sessionCheckInterval) clearInterval(sessionCheckInterval);
    const loginTime = Date.now();
    sessionCheckInterval = setInterval(
      () => {
        const elapsed = Date.now() - loginTime;
        if (elapsed > 5.5 * 60 * 60 * 1000) {
          // Sekitar 5.5 jam (token kadaluarsa dalam 6 jam)
          showToast(
            "Peringatan: Sesi Anda akan berakhir dalam 30 menit. Harap simpan pekerjaan Anda.",
            "error",
          );
        }
      },
      30 * 60 * 1000,
    ); // Check setiap 30 menit
  }

  // 4. FUNGSI TAMPILAN & LOADING
  let loadingTimeout = null;
  function showLoading(s) {
    const ld = document.getElementById("loading");
    const timeoutMsg = document.getElementById("loadingTimeoutMsg");
    if (s) {
      ld.classList.remove("hidden");
      ld.classList.add("flex");
      if (timeoutMsg) timeoutMsg.classList.add("hidden");

      loadingTimeout = setTimeout(() => {
        if (timeoutMsg) timeoutMsg.classList.remove("hidden");
      }, 15000);
    } else {
      ld.classList.add("hidden");
      ld.classList.remove("flex");
      if (loadingTimeout) clearTimeout(loadingTimeout);
    }
  }

  function showToast(message, type = "success") {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    const isError = type === "error";
    const bgClass = isError
      ? "bg-red-500 border-red-400/50"
      : "bg-slate-800 border-slate-700/50";
    const icon = isError
      ? `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
             d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
         </svg>`
      : `<svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
             d="M5 13l4 4L19 7"/>
         </svg>`;
    toast.className = `${bgClass} text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-2.5 transform transition-all duration-300 translate-y-[-100%] opacity-0 border pointer-events-auto`;
    toast.innerHTML = `${icon}<span class="text-xs font-bold tracking-wide leading-tight">${escapeHTML(message)}</span>`;
    container.appendChild(toast);
    requestAnimationFrame(() =>
      toast.classList.remove("translate-y-[-100%]", "opacity-0"),
    );
    setTimeout(() => {
      toast.classList.add("translate-y-[-100%]", "opacity-0");
      setTimeout(() => toast.remove(), 300);
    }, 3500);
  }

  function getBadgeStyle(status) {
    const st = status ? String(status).toLowerCase() : "";
    if (st === "diambil") return "bg-blue-100 text-blue-700 border-blue-200";
    if (st === "selesai")
      return "bg-emerald-100 text-emerald-700 border-emerald-200";
    return "bg-slate-800 text-white border-slate-900";
  }

  function getPayBadgeStyle(status) {
    const st = status ? String(status).toLowerCase() : "";
    if (st === "lunas")
      return "bg-emerald-100 text-emerald-700 border-emerald-200";
    return "bg-red-100 text-red-600 border-red-200";
  }

  function toggleMobileMenu() {
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("sidebarOverlay");
    if (sidebar.classList.contains("-translate-x-full")) {
      sidebar.classList.remove("-translate-x-full");
      overlay.classList.remove("hidden");
      setTimeout(() => overlay.classList.remove("opacity-0"), 10);
    } else {
      sidebar.classList.add("-translate-x-full");
      overlay.classList.add("opacity-0");
      setTimeout(() => overlay.classList.add("hidden"), 300);
    }
  }

  // 5. INSISIALISASI SISTEM
  window.onload = function () {
    const d = new Date();
    const elDate = document.getElementById("dateDisplay");
    if (elDate)
      elDate.innerText = d.toLocaleDateString("id-ID", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric",
      });
    const elReport = document.getElementById("reportStart");
    if (elReport) elReport.value = d.toISOString().split("T")[0];

    const saved = localStorage.getItem("l_premium_session_v3");
    if (saved) {
      try {
        const sessionData = JSON.parse(saved);
        if (new Date().getTime() > sessionData.expiry)
          throw new Error("Expired");
        currentUser = sessionData.user;
        setupDashboard();
      } catch (e) {
        handleLogout();
      }
    }
  };

  function loadSettings() {
    // [P1] Cek localStorage cache dulu
    const cached = localStorage.getItem("l_premium_settings_cache");
    if (cached) {
      try {
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed._ts < 3600000) {
          // 1 jam TTL
          applySettingsToUI(parsed);
          return;
        }
      } catch (e) {}
    }
    google.script.run
      .withSuccessHandler(function (data) {
        if (data) {
          // Simpan ke localStorage
          data._ts = Date.now();
          try {
            localStorage.setItem(
              "l_premium_settings_cache",
              JSON.stringify(data),
            );
          } catch (e) {}
          applySettingsToUI(data);
        }
      })
      .getSettings();
  }

  function applySettingsToUI(data) {
    if (data.app_name) appSettings.app_name = data.app_name;
    if (data.app_logo_url !== undefined)
      appSettings.app_logo_url = data.app_logo_url;
    if (data.nota_title) appSettings.nota_title = data.nota_title;
    if (data.nota_subtitle) appSettings.nota_subtitle = data.nota_subtitle;
    if (data.nota_footer) appSettings.nota_footer = data.nota_footer;
    if (data.wa_template) appSettings.wa_template = data.wa_template;
    if (data.bank_name) appSettings.bank_name = data.bank_name;
    if (data.bank_rek) appSettings.bank_rek = data.bank_rek;
    if (data.bank_an) appSettings.bank_an = data.bank_an;
    appSettings.nota_tatatertib = data.nota_tatatertib || "";

    const displayAppName = appSettings.app_name || appSettings.nota_title;

    document.title = displayAppName + " System";

    document.getElementById("sidebarTitle").innerText =
      escapeHTML(displayAppName);
    const loginAppName = document.getElementById("loginAppName");
    if (loginAppName) loginAppName.innerText = escapeHTML(displayAppName);

    const loginFooterText = document.getElementById("loginFooterText");
    if (loginFooterText)
      loginFooterText.innerText =
        "© " +
        new Date().getFullYear() +
        " " +
        escapeHTML(displayAppName) +
        " System";

    const loginAppNameMobile = document.getElementById("loginAppNameMobile");
    if (loginAppNameMobile)
      loginAppNameMobile.innerText = escapeHTML(displayAppName);

    const loginFooterTextMobile = document.getElementById(
      "loginFooterTextMobile",
    );
    if (loginFooterTextMobile)
      loginFooterTextMobile.innerText =
        "© " +
        new Date().getFullYear() +
        " " +
        escapeHTML(displayAppName) +
        " System";

    const logoUrl = appSettings.app_logo_url;
    const initialText1 = displayAppName.charAt(0).toUpperCase();
    const initialText2 = displayAppName.substring(0, 2).toUpperCase() || "LP";

    const updateLogo = (boxId, textId, imgId, initialLength = 1) => {
      const box = document.getElementById(boxId);
      const text = document.getElementById(textId);
      const img = document.getElementById(imgId);
      if (!box || !text || !img) return;

      if (logoUrl) {
        img.src = logoUrl;
        img.classList.remove("hidden");
        text.classList.add("hidden");
        box.classList.add("bg-transparent");
        box.classList.remove(
          "bg-blue-600",
          "bg-gradient-to-br",
          "from-blue-600",
          "to-blue-700",
        );
      } else {
        img.src = "";
        img.classList.add("hidden");
        text.classList.remove("hidden");
        text.innerText = initialLength === 2 ? initialText2 : initialText1;
        box.classList.remove("bg-transparent");
        if (boxId === "loginLogoBox") box.classList.add("bg-blue-600");
        if (boxId === "sidebarLogoBox")
          box.classList.add(
            "bg-gradient-to-br",
            "from-blue-600",
            "to-blue-700",
          );
      }
    };

    updateLogo("loginLogoBox", "loginLogoText", "loginLogoImg", 2);
    updateLogo("sidebarLogoBox", "sidebarLogoText", "sidebarLogoImg", 1);

    document.getElementById("infoBankName").innerText = escapeHTML(
      appSettings.bank_name,
    );
    document.getElementById("infoBankRek").innerText = escapeHTML(
      appSettings.bank_rek,
    );
    document.getElementById("infoBankAN").innerText = escapeHTML(
      appSettings.bank_an,
    );
    document.getElementById("modalBankName").innerText = escapeHTML(
      appSettings.bank_name,
    );
    document.getElementById("modalBankRek").innerText = escapeHTML(
      appSettings.bank_rek,
    );
    document.getElementById("modalBankAN").innerText = escapeHTML(
      appSettings.bank_an,
    );
    const bn2 = document.getElementById("infoBankName2");
    const br2 = document.getElementById("infoBankRek2");
    const ba2 = document.getElementById("infoBankAN2");
    if (bn2) bn2.innerText = escapeHTML(appSettings.bank_name);
    if (br2) br2.innerText = escapeHTML(appSettings.bank_rek);
    if (ba2) ba2.innerText = escapeHTML(appSettings.bank_an);
  }

  function saveAppSettings() {
    const appName = document.getElementById("setAppName").value.trim();
    const appLogoUrl = document.getElementById("setAppLogoUrl").value.trim();
    const title = document.getElementById("setNotaTitle").value.trim();
    const sub = document.getElementById("setNotaSubtitle").value.trim();
    const foot = document.getElementById("setNotaFooter").value;
    const wa = document.getElementById("setWaTemplate").value;
    const bName = document.getElementById("setBankName").value.trim();
    const bRek = document.getElementById("setBankRek").value.trim();
    const bAN = document.getElementById("setBankAN").value.trim();
    const tatatertib = document.getElementById("setNotaTatatertib").value;
    if (!title || !wa) {
      showToast("Nama Toko & Template WA wajib diisi!", "error");
      return;
    }
    const newData = {
      app_name: appName,
      app_logo_url: appLogoUrl,
      nota_title: title,
      nota_subtitle: sub,
      nota_footer: foot,
      wa_template: wa,
      bank_name: bName,
      bank_rek: bRek,
      bank_an: bAN,
      nota_tatatertib: tatatertib,
    };

    // Inline loading di tombol
    const btn = document.getElementById("btnSaveSettings");
    const origHtml = btn ? btn.innerHTML : null;
    if (btn) {
      btn.disabled = true;
      btn.innerHTML =
        '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Menyimpan...';
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = origHtml;
        }
        if (res.success) {
          appSettings = newData;
          try {
            localStorage.removeItem("l_premium_settings_cache");
          } catch (e) {}
          loadSettings();
          showToast("Pengaturan disimpan!");
          // [P3] Sembunyikan badge unsaved
          const badge = document.getElementById("settingsUnsavedBadge");
          if (badge) badge.classList.add("hidden");
        } else {
          showToast("Gagal menyimpan!", "error");
        }
      })
      .withFailureHandler(function (err) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = origHtml;
        }
        showToast("Gagal simpan pengaturan: " + err.message, "error");
      })
      .saveSettingsConfig(currentUser.token, newData);
  }

  // [P3] Tandai settings berubah saat ada input
  function markSettingsDirty() {
    const badge = document.getElementById("settingsUnsavedBadge");
    if (badge) badge.classList.remove("hidden");
  }

  function setupDashboard() {
    const lp = document.getElementById("loginPage");
    const dp = document.getElementById("dashboardPage");
    lp.style.opacity = "0";
    loadSettings();
    setTimeout(() => {
      lp.classList.add("hidden");
      dp.classList.remove("hidden");
      setTimeout(() => (dp.style.opacity = "1"), 50);
      document.getElementById("userNameDisplay").innerText =
        "Halo, " + escapeHTML(currentUser.nama || "Pengguna");
      startSessionTimer(); // Memulai timer sesi
      const sidebarUserName = document.getElementById("sidebarUserName");
      const sidebarUserRole = document.getElementById("sidebarUserRole");
      if (sidebarUserName)
        sidebarUserName.innerText = escapeHTML(currentUser.nama || "Pengguna");
      if (sidebarUserRole)
        sidebarUserRole.innerText = escapeHTML(currentUser.role || "Staff");

      if (currentUser.nama) {
        const initials = document.querySelectorAll(
          "#userInitial, #sidebarUserInitial",
        );
        for (let i = 0; i < initials.length; i++)
          initials[i].innerText = escapeHTML(
            currentUser.nama.charAt(0).toUpperCase(),
          );
      }
      const isAdmin = currentUser.role === "admin";
      document
        .getElementById("adminMenuDesktop")
        .classList.toggle("hidden", !isAdmin);
      document
        .getElementById("adminLaporanDesktop")
        .classList.toggle("hidden", !isAdmin);
      document
        .getElementById("adminSettingsDesktop")
        .classList.toggle("hidden", !isAdmin);
      document
        .getElementById("adminUsersDesktop")
        .classList.toggle("hidden", !isAdmin);
      // FITUR PROMO TELAH DIHAPUS

      showSection("overview");
      fetchCustomers();

      // [OPT] Auto-refresh dashboard setiap 1 menit (multi-kasir sync)
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      autoRefreshInterval = setInterval(function () {
        const onDash = !document
          .getElementById("section-overview")
          .classList.contains("hidden");
        const onHist = !document
          .getElementById("section-history")
          .classList.contains("hidden");
        const onLaporan = !document
          .getElementById("section-laporan")
          .classList.contains("hidden");
          
        if (onDash || onHist) loadTransactions(true);
        if (onLaporan) generateReport(currentReportType, true);
      }, 60000); // 1 menit

      // [OPT] Draft auto-save setiap 5 detik
      if (draftSaveInterval) clearInterval(draftSaveInterval);
      draftSaveInterval = setInterval(autoSaveDraft, 5000);
    }, 300);
  }

  function togglePasswordVisibility() {
    const pwd = document.getElementById("password");
    const eyeOpen = document.getElementById("eyeIconOpen");
    const eyeClosed = document.getElementById("eyeIconClosed");
    if (pwd.type === "password") {
      pwd.type = "text";
      eyeOpen.classList.remove("hidden");
      eyeClosed.classList.add("hidden");
    } else {
      pwd.type = "password";
      eyeOpen.classList.add("hidden");
      eyeClosed.classList.remove("hidden");
    }
  }

  function handleLogin(event) {
    if (event) event.preventDefault();
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const errCont = document.getElementById("loginErrorContainer");
    const errText = document.getElementById("loginError");
    const btn = document.getElementById("loginBtn");
    const btnText = document.getElementById("loginBtnText");
    const btnSpinner = document.getElementById("loginSpinner");

    errCont.classList.add("hidden");

    if (!u || !p) {
      errText.innerText = "Username dan password wajib diisi!";
      errCont.classList.remove("hidden");
      return;
    }

    // UI state loading (inline button)
    btn.disabled = true;
    btn.classList.add("opacity-80", "cursor-not-allowed");
    btnText.innerText = "Memproses...";
    btnSpinner.classList.remove("hidden");

    google.script.run
      .withSuccessHandler(function (res) {
        // Restore UI state
        btn.disabled = false;
        btn.classList.remove("opacity-80", "cursor-not-allowed");
        btnText.innerText = "Masuk ke Sistem";
        btnSpinner.classList.add("hidden");

        if (res && res.success) {
          currentUser = { role: res.role, nama: res.nama, token: res.token };
          const expiry = new Date().getTime() + 6 * 60 * 60 * 1000;
          localStorage.setItem(
            "l_premium_session_v3",
            JSON.stringify({ user: currentUser, expiry: expiry }),
          );
          showToast("Berhasil Masuk");
          setupDashboard();
        } else {
          errText.innerText = res
            ? res.message
            : "Gagal masuk. Periksa kembali kredensial Anda.";
          errCont.classList.remove("hidden");
        }
      })
      .withFailureHandler(function (error) {
        // Restore UI state
        btn.disabled = false;
        btn.classList.remove("opacity-80", "cursor-not-allowed");
        btnText.innerText = "Masuk ke Sistem";
        btnSpinner.classList.add("hidden");

        errText.innerText = "Koneksi Gagal: " + error.message;
        errCont.classList.remove("hidden");
      })
      .login(u, p);
  }

  function showLogoutConfirm() {
    const modal = document.getElementById("logoutConfirmModal");
    const content = document.getElementById("logoutConfirmContent");
    if (!modal) {
      executeLogout();
      return;
    }
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    setTimeout(() => {
      content.classList.remove("scale-95");
      content.classList.add("scale-100");
      const cancelBtn = document.getElementById("logoutCancelBtn");
      if (cancelBtn) cancelBtn.focus();
    }, 10);
  }

  function closeLogoutConfirmModal() {
    const modal = document.getElementById("logoutConfirmModal");
    const content = document.getElementById("logoutConfirmContent");
    content.classList.remove("scale-100");
    content.classList.add("scale-95");
    setTimeout(() => {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }, 200);
  }

  function executeLogout() {
    closeLogoutConfirmModal();
    handleLogout();
  }

  function handleLogout() {
    localStorage.removeItem("l_premium_session_v3");
    // [P1] Hapus cache saat logout
    try {
      localStorage.removeItem("l_premium_settings_cache");
    } catch (e) {}
    transactionsCacheTime = 0;
    // [OPT] Hentikan semua interval
    if (autoRefreshInterval) {
      clearInterval(autoRefreshInterval);
      autoRefreshInterval = null;
    }
    if (draftSaveInterval) {
      clearInterval(draftSaveInterval);
      draftSaveInterval = null;
    }
    const dp = document.getElementById("dashboardPage");
    const lp = document.getElementById("loginPage");
    dp.style.opacity = "0";
    setTimeout(() => {
      dp.classList.add("hidden");
      lp.classList.remove("hidden");
      lp.style.opacity = "1";
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      currentUser = null;
    }, 400);
  }

  function showSection(name) {
    // [UX] Konfirmasi custom jika ada transaksi belum disimpan
    if (
      typeof currentCart !== "undefined" &&
      currentCart.length > 0 &&
      name !== "transaksi"
    ) {
      pendingNavSection = name;
      openNavConfirmModal();
      return;
    }
    _doShowSection(name);
  }

  // State untuk navigasi tertunda
  let pendingNavSection = null;

  function openNavConfirmModal() {
    const modal = document.getElementById("navConfirmModal");
    const content = document.getElementById("navConfirmContent");
    if (!modal) return;
    modal.classList.remove("hidden");
    modal.classList.add("flex");
    setTimeout(() => {
      content.classList.remove("scale-95");
      content.classList.add("scale-100");
    }, 10);
    // Focus trap: fokus ke tombol "Tetap di Sini"
    setTimeout(() => {
      const cancelBtn = document.getElementById("navConfirmCancel");
      if (cancelBtn) cancelBtn.focus();
    }, 50);
  }

  function closeNavConfirmModal() {
    const modal = document.getElementById("navConfirmModal");
    const content = document.getElementById("navConfirmContent");
    if (!modal) return;
    content.classList.remove("scale-100");
    content.classList.add("scale-95");
    setTimeout(() => {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
    }, 200);
    pendingNavSection = null;
  }

  function executeNavConfirm() {
    // [FIX] Simpan target navigasi SEBELUM closeNavConfirmModal() me-null-kan pendingNavSection
    const target = pendingNavSection;
    closeNavConfirmModal();
    if (target) {
      currentCart = []; // Bersihkan keranjang agar tidak memicu konfirmasi lagi
      renderCart();
      _doShowSection(target);
    }
  }

  function _doShowSection(name) {
    const sections = document.querySelectorAll(".section");
    for (let i = 0; i < sections.length; i++)
      sections[i].classList.add("hidden");
    const navBtns = document.querySelectorAll(".nav-btn");
    for (let i = 0; i < navBtns.length; i++) {
      navBtns[i].classList.remove("bg-blue-50", "text-blue-700", "font-bold");
      navBtns[i].classList.add("text-slate-500", "font-medium");
      const indicator = navBtns[i].querySelector(".nav-indicator");
      if (indicator) indicator.classList.add("hidden");
      const icon = navBtns[i].querySelector("svg");
      if (icon) {
        icon.classList.remove("text-blue-600");
        icon.classList.add("text-slate-400", "group-hover:text-blue-500");
      }
    }
    const mobBtns = document.querySelectorAll(".mob-nav-btn");
    for (let i = 0; i < mobBtns.length; i++)
      mobBtns[i].classList.remove("text-blue-600");

    const targetSection = document.getElementById("section-" + name);
    if (targetSection) targetSection.classList.remove("hidden");

    // [FIX] Active state: cari tombol yang tepat berdasarkan ID eksak
    const btnDesktop = document.getElementById("btn-" + name);
    if (btnDesktop) {
      btnDesktop.classList.remove("text-slate-500", "font-medium");
      btnDesktop.classList.add("bg-blue-50", "text-blue-700", "font-bold");
      const indicator = btnDesktop.querySelector(".nav-indicator");
      if (indicator) indicator.classList.remove("hidden");
      const icon = btnDesktop.querySelector("svg");
      if (icon) {
        icon.classList.remove("text-slate-400", "group-hover:text-blue-500");
        icon.classList.add("text-blue-600");
      }
    } else {
      // Fallback untuk menu admin yang ID-nya berbeda
      const adminMap = {
        laporan: "adminLaporanDesktop",
        paket: "adminMenuDesktop",
        settings: "adminSettingsDesktop",
        pegawai: "adminUsersDesktop",
      };
      const adminBtnId = adminMap[name];
      if (adminBtnId) {
        const adminBtn = document.getElementById(adminBtnId);
        if (adminBtn) {
          adminBtn.classList.remove("text-slate-500", "font-medium");
          adminBtn.classList.add("bg-blue-50", "text-blue-700", "font-bold");
          const indicator = adminBtn.querySelector(".nav-indicator");
          if (indicator) indicator.classList.remove("hidden");
          const icon = adminBtn.querySelector("svg");
          if (icon) {
            icon.classList.remove(
              "text-slate-400",
              "group-hover:text-blue-500",
            );
            icon.classList.add("text-blue-600");
          }
        }
      }
    }

    const btnMobile = document.getElementById("mob-" + name);
    if (btnMobile) btnMobile.classList.add("text-blue-600");

    const sidebar = document.getElementById("sidebar");
    if (
      sidebar &&
      !sidebar.classList.contains("-translate-x-full") &&
      window.innerWidth < 1024
    ) {
      toggleMobileMenu();
    }

    if (name === "laporan") generateReport("today");
    if (name === "transaksi" || name === "paket") fetchPaket();
    if (name === "transaksi") restoreDraft();
    if (name === "pelanggan") {
      document.getElementById("searchCustomerDB").value = "";
      fetchCustomers();
    }
    if (name === "pegawai") {
      fetchUsers();
    }
    if (name === "history" || name === "overview") {
      const sH = document.getElementById("searchHistory");
      if (sH) sH.value = "";
      const fS = document.getElementById("filterStatus");
      if (fS) fS.value = "Semua";
      loadTransactions();
    }
    if (name === "settings") {
      document.getElementById("setAppName").value =
        appSettings.app_name || appSettings.nota_title;
      document.getElementById("setAppLogoUrl").value =
        appSettings.app_logo_url || "";
      document.getElementById("setNotaTitle").value = appSettings.nota_title;
      document.getElementById("setNotaSubtitle").value =
        appSettings.nota_subtitle;
      document.getElementById("setNotaFooter").value = appSettings.nota_footer;
      document.getElementById("setWaTemplate").value = appSettings.wa_template;
      document.getElementById("setBankName").value = appSettings.bank_name;
      document.getElementById("setBankRek").value = appSettings.bank_rek;
      document.getElementById("setBankAN").value = appSettings.bank_an;
      document.getElementById("setNotaTatatertib").value =
        appSettings.nota_tatatertib || "";
      setTimeout(previewWaTemplate, 50);
      setTimeout(previewSetLogo, 50);
    }
  }

  function previewSetLogo() {
    const url = document.getElementById("setAppLogoUrl").value.trim();
    const box = document.getElementById("setLogoPreviewBox");
    const text = document.getElementById("setLogoPreviewText");
    const img = document.getElementById("setLogoPreviewImg");
    if (!box || !text || !img) return;

    if (url) {
      img.src = url;
      img.classList.remove("hidden");
      text.classList.add("hidden");
      box.classList.add("bg-transparent");
      box.classList.remove("bg-slate-100");
    } else {
      img.src = "";
      img.classList.add("hidden");
      text.classList.remove("hidden");
      const appNameVal =
        document.getElementById("setAppName").value ||
        appSettings.app_name ||
        appSettings.nota_title ||
        "L";
      text.innerText = appNameVal.charAt(0).toUpperCase();
      box.classList.remove("bg-transparent");
      box.classList.add("bg-slate-100");
    }
  }

  // 7. PELANGGAN
  function fetchCustomers() {
    // [P1] Tampilkan skeleton loading saat fetch
    const cont = document.getElementById("tableCustomers");
    if (cont && allCustomers.length === 0) {
      cont.innerHTML = `
        <div class="flex flex-col gap-3">
          ${[1, 2, 3]
            .map(
              () => `
            <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-100 animate-pulse flex items-center gap-4">
              <div class="w-12 h-12 rounded-full bg-slate-200 flex-shrink-0"></div>
              <div class="flex-1 space-y-2">
                <div class="h-4 bg-slate-200 rounded-lg w-1/3"></div>
                <div class="h-3 bg-slate-100 rounded-lg w-1/2"></div>
              </div>
              <div class="h-8 w-20 bg-slate-100 rounded-xl"></div>
            </div>`,
            )
            .join("")}
        </div>`;
    }
    google.script.run
      .withSuccessHandler(function (data) {
        allCustomers = data || [];
        renderCustomerGrid(allCustomers);
      })
      .withFailureHandler(function (err) {
        if (cont)
          cont.innerHTML = `
          <div class="flex flex-col items-center justify-center py-14 bg-white rounded-2xl border border-dashed border-red-200 gap-3">
            <p class="font-bold text-red-500 text-sm">Gagal memuat data pelanggan</p>
            <p class="text-xs text-slate-400">${escapeHTML(err.message)}</p>
            <button onclick="fetchCustomers()" class="bg-blue-600 text-white font-bold text-xs px-4 py-2 rounded-xl transition-all active:scale-95">Coba Lagi</button>
          </div>`;
        showToast("Gagal memuat data pelanggan: " + err.message, "error");
      })
      .getCustomers(currentUser.token);
  }

  function renderCustomerGrid(data) {
    const cont = document.getElementById("tableCustomers");
    if (!cont) return;
    if (data.length === 0) {
      const isFiltered =
        (document.getElementById("searchCustomerDB")?.value || "").trim() !==
        "";
      cont.innerHTML = isFiltered
        ? `<div class="flex flex-col items-center justify-center py-14 bg-white rounded-2xl border border-dashed border-slate-200 gap-4">
            <div class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center">
              <svg class="w-7 h-7 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
            </div>
            <div class="text-center">
              <p class="font-black text-slate-700 text-sm mb-1">Pelanggan tidak ditemukan</p>
              <p class="text-xs text-slate-400 font-medium">Coba kata kunci atau nomor WA yang berbeda</p>
            </div>
          </div>`
        : `<div class="flex flex-col items-center justify-center py-14 bg-white rounded-2xl border border-dashed border-slate-200 gap-4">
            <div class="w-14 h-14 bg-emerald-50 rounded-full flex items-center justify-center">
              <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
              </svg>
            </div>
            <div class="text-center">
              <p class="font-black text-slate-700 text-sm mb-1">Belum ada pelanggan</p>
              <p class="text-xs text-slate-400 font-medium">Tambahkan pelanggan pertama menggunakan form di samping</p>
            </div>
          </div>`;
      return;
    }

    // [OPT] Build Hash Map O(M) untuk transaksi agar tidak terjadi O(N*M) loop
    let trxMap = {};
    if (typeof allTransactions !== "undefined" && allTransactions.length > 0) {
      for (let j = 0; j < allTransactions.length; j++) {
        let tx = allTransactions[j];
        if (!tx.customer) continue;
        let cName = tx.customer.toLowerCase();
        if (!trxMap[cName]) trxMap[cName] = { count: 0, spent: 0 };
        trxMap[cName].count++;
        if (tx.status_pembayaran === "Lunas") {
          trxMap[cName].spent += parseInt(tx.total || 0);
        }
      }
    }

    let htmlString = "";
    for (let i = 0; i < data.length; i++) {
      const c = data[i];
      const d = new Date(c.terakhir_order);
      const dateStr = isNaN(d)
        ? "-"
        : d.toLocaleDateString("id-ID", {
            day: "numeric",
            month: "short",
            year: "numeric",
          });
      const safeWa = c.whatsapp || "";
      const namaAman = escapeHTML(c.nama);
      const waAman = escapeHTML(safeWa);

      // [OPT] Ambil dari Hash Map O(1)
      let totalTrx = 0;
      let totalSpent = 0;
      let cNameLower = c.nama.toLowerCase();
      if (trxMap[cNameLower]) {
        totalTrx = trxMap[cNameLower].count;
        totalSpent = trxMap[cNameLower].spent;
      }

      let badgeHtml = "";
      if (totalSpent >= 2000000) {
        badgeHtml = `<span class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white px-2 py-0.5 rounded border border-purple-500/30 text-[8px] font-black tracking-widest uppercase shadow-sm ml-2">VIP</span>`;
      } else if (totalSpent >= 750000) {
        badgeHtml = `<span class="bg-gradient-to-r from-amber-300 to-orange-400 text-white px-2 py-0.5 rounded border border-orange-300/50 text-[8px] font-black tracking-widest uppercase shadow-sm ml-2">GOLD</span>`;
      } else if (totalSpent >= 250000) {
        badgeHtml = `<span class="bg-gradient-to-r from-slate-200 to-slate-300 text-slate-700 px-2 py-0.5 rounded border border-slate-300/50 text-[8px] font-black tracking-widest uppercase shadow-sm ml-2">SILVER</span>`;
      } else {
        badgeHtml = `<span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded text-[8px] font-bold tracking-widest uppercase ml-2">MEMBER</span>`;
      }

      // Ambil inisial
      const initial = namaAman.charAt(0).toUpperCase();

      htmlString += `
                <div class="bg-white p-4 md:p-5 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all flex flex-col md:flex-row md:items-center justify-between gap-4 group">
                    
                    <!-- KIRI: Avatar & Identitas -->
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <!-- Avatar -->
                        <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-slate-100 text-slate-600 font-black flex items-center justify-center flex-shrink-0 text-sm md:text-base group-hover:bg-emerald-50 group-hover:text-emerald-600 transition-colors border border-slate-200/50">${initial}</div>
                        
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center flex-wrap gap-2 mb-0.5">
                                <h5 class="font-black text-slate-900 text-sm md:text-base leading-tight truncate">${namaAman}</h5>
                                ${badgeHtml}
                            </div>
                            <div class="flex items-center gap-2 text-[10px] md:text-xs font-bold text-slate-500">
                                <span class="flex items-center gap-1"><svg class="w-3 h-3 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg> ${waAman || "Tidak ada WA"}</span>
                                <span class="text-slate-300 hidden md:inline">•</span>
                                <span class="hidden md:inline">Terakhir: ${dateStr}</span>
                            </div>
                        </div>
                    </div>

                    <!-- KANAN: Statistik & Aksi -->
                    <div class="flex flex-wrap md:flex-nowrap items-center justify-between md:justify-end gap-4 w-full md:w-auto mt-2 md:mt-0 pt-3 md:pt-0 border-t md:border-t-0 border-slate-100">
                        
                        <div class="text-left md:text-right flex-shrink-0">
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest hidden md:block mb-0.5">Total ${totalTrx}x Order</p>
                            <div class="flex flex-col md:block">
                                <span class="text-sm md:text-base font-black text-emerald-600 leading-none">Rp ${totalSpent.toLocaleString("id-ID")}</span>
                                <span class="text-[9px] font-bold text-slate-400 block md:hidden mt-0.5">${totalTrx}x Order &bull; Terakhir: ${dateStr}</span>
                            </div>
                        </div>

                        <!-- Divider (Desktop) -->
                        <div class="w-px h-8 bg-slate-200 hidden md:block mx-1"></div>

                        <!-- Actions -->
                        <div class="flex gap-1.5 flex-shrink-0">
                            <button onclick="editCustomer('${escapeHTML(c.id)}', '${namaAman}', '${waAman}')" class="text-slate-400 hover:text-amber-600 bg-slate-50 hover:bg-amber-50 p-2.5 rounded-lg transition-colors border border-slate-100 shadow-sm" title="Edit"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg></button>
                            <button onclick="deleteCustomerUI('${escapeHTML(c.id)}')" class="text-slate-400 hover:text-red-600 bg-slate-50 hover:bg-red-50 p-2.5 rounded-lg transition-colors border border-slate-100 shadow-sm" title="Hapus"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                        </div>
                    </div>
                </div>`;
    }
    cont.innerHTML = htmlString;
  }

  function filterCustomerList() {
    const val = document.getElementById("searchCustomerDB").value.toLowerCase();
    const filtered = [];
    for (let i = 0; i < allCustomers.length; i++) {
      if (
        allCustomers[i].nama.toLowerCase().includes(val) ||
        (allCustomers[i].whatsapp &&
          String(allCustomers[i].whatsapp).includes(val))
      )
        filtered.push(allCustomers[i]);
    }
    renderCustomerGrid(filtered);
  }

  function saveCustomer() {
    const n = document.getElementById("newCustName").value.trim();
    const w = document.getElementById("newCustWA").value.trim();
    if (!n) {
      showToast("Nama pelanggan wajib diisi!", "error");
      return;
    }
    // [FIX] Nomor WA wajib diisi
    if (!w) {
      showToast("Nomor WhatsApp wajib diisi!", "error");
      return;
    }
    // [FIX] Validasi format nomor WA (konsisten dengan previewTransaksi)
    if (!/^[0-9]{10,15}$/.test(w.replace(/[\s\-\+]/g, ""))) {
      showToast("Format nomor WhatsApp tidak valid! (10-15 digit)", "error");
      return;
    }
    const btn = document.getElementById("btnSaveCust");
    const origHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML =
      '<svg class="animate-spin w-5 h-5" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg> Menyimpan...';

    if (editingCustomerId) {
      google.script.run
        .withSuccessHandler((res) => {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          if (res.success) {
            showToast("Data diperbarui!");
            cancelEditCustomer();
            fetchCustomers();
          } else {
            showToast("Gagal mengupdate!", "error");
          }
        })
        .withFailureHandler((err) => {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          showToast("Gagal: " + err.message, "error");
        })
        .updateCustomerData(currentUser.token, editingCustomerId, n, w);
    } else {
      google.script.run
        .withSuccessHandler((res) => {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          if (res.success) {
            showToast("Pelanggan disimpan!");
            cancelEditCustomer();
            fetchCustomers();
          }
        })
        .withFailureHandler((err) => {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          showToast("Gagal: " + err.message, "error");
        })
        .addCustomerData(currentUser.token, n, w);
    }

  // 8. DASHBOARD & HISTORY
  function loadTransactions(forceRefresh) {
    // [P1] Client-side cache — skip server call jika data masih fresh
    const now = Date.now();
    if (
      !forceRefresh &&
      allTransactions.length > 0 &&
      now - transactionsCacheTime < TRX_CACHE_TTL
    ) {
      updateOverviewStats();
      updateRecentActivity();
      if (
        !document.getElementById("section-history").classList.contains("hidden")
      )
        filterHistory();
      return;
    }

    // [P0] Silent refresh — hanya tampilkan loading global saat pertama kali (data kosong)
    // Auto-refresh setiap 1 menit tidak boleh memblokir UI
    const isFirstLoad = allTransactions.length === 0;
    if (isFirstLoad) showLoading(true);

    // Tampilkan indikator refresh kecil di pojok
    const refreshEl = document.getElementById("lastRefresh");
    if (refreshEl && !isFirstLoad) refreshEl.innerText = "Memperbarui...";

    google.script.run
      .withSuccessHandler(function (data) {
        if (isFirstLoad) showLoading(false);
        if (!data) {
          showToast("Data transaksi kosong dari server.", "error");
          return;
        }
        allTransactions = data;
        transactionsCacheTime = Date.now(); // [P1] Catat waktu cache
        updateOverviewStats();
        updateRecentActivity();
        // Tampilkan timestamp terakhir diperbarui
        if (refreshEl)
          refreshEl.innerText =
            "Diperbarui: " +
            new Date().toLocaleTimeString("id-ID", {
              hour: "2-digit",
              minute: "2-digit",
            });
        if (
          !document
            .getElementById("section-history")
            .classList.contains("hidden")
        )
          filterHistory();
      })
      .withFailureHandler(function (err) {
        if (isFirstLoad) showLoading(false);
        // [P0] Jangan alert — tampilkan toast agar tidak blokir UI
        showToast("Gagal memuat transaksi: " + err.message, "error");
        if (refreshEl) refreshEl.innerText = "Gagal memperbarui";
      })
      .getTransactions(currentUser.token);
  }

  function updateOverviewStats() {
    const now = new Date();
    let rev = 0;
    let prosesCount = 0;
    let siapDiambilCount = 0;
    let targetHariIni = 0;

    for (let i = 0; i < allTransactions.length; i++) {
      const t = allTransactions[i];
      const d = new Date(t.tanggal);
      const est = new Date(t.estimasi);

      const isTodayTrx =
        !isNaN(d) &&
        d.getDate() === now.getDate() &&
        d.getMonth() === now.getMonth() &&
        d.getFullYear() === now.getFullYear();

      const pDate = t.tanggal_pelunasan ? new Date(t.tanggal_pelunasan) : null;
      const isTodayPelunasan =
        pDate &&
        !isNaN(pDate) &&
        pDate.getDate() === now.getDate() &&
        pDate.getMonth() === now.getMonth() &&
        pDate.getFullYear() === now.getFullYear();

      const isTargetToday =
        !isNaN(est) &&
        est.getDate() === now.getDate() &&
        est.getMonth() === now.getMonth() &&
        est.getFullYear() === now.getFullYear();

      if (isTodayTrx) rev += parseInt(t.nominal_dp || 0);
      if (isTodayPelunasan) rev += parseInt(t.nominal_pelunasan || 0);

      const stat = t.status ? t.status.toLowerCase() : "";
      if (stat === "proses") prosesCount++;
      if (stat === "selesai") siapDiambilCount++;

  function filterHistory(resetLimit = true) {
    if (resetLimit) historyRenderLimit = 30;
    const searchInput = document
      .getElementById("searchHistory")
      .value.toLowerCase();
    const statusFilter = document.getElementById("filterStatus").value;

    const startDateVal = document.getElementById("filterStartDate").value;
    const endDateVal = document.getElementById("filterEndDate").value;

    let startDate = null;
    let endDate = null;
    if (startDateVal) {
      startDate = new Date(startDateVal);
      startDate.setHours(0, 0, 0, 0);
    }
    if (endDateVal) {
      endDate = new Date(endDateVal);
      endDate.setHours(23, 59, 59, 999);
    }

    const filteredData = [];
    for (let i = 0; i < allTransactions.length; i++) {
      const tr = allTransactions[i];
      const custName = tr.customer ? tr.customer.toLowerCase() : "";
      const paketName = tr.paket ? tr.paket.toLowerCase() : "";
      const statusName = tr.status ? tr.status.toLowerCase() : "";
      const notaId = tr.id ? tr.id.toLowerCase() : "";

      // Check Date Range
      let passDateFilter = true;
      if (startDate || endDate) {
        const trDate = new Date(tr.tanggal);
        if (isNaN(trDate)) {
          passDateFilter = false;
        } else {
          if (startDate && trDate < startDate) passDateFilter = false;
          if (endDate && trDate > endDate) passDateFilter = false;
        }
      }

      if (
        passDateFilter &&
        (custName.includes(searchInput) ||
          paketName.includes(searchInput) ||
          notaId.includes(searchInput)) &&
        (statusFilter === "Semua" || statusName === statusFilter.toLowerCase())
      ) {
        filteredData.push(tr);
      }
    }
    renderHistory(filteredData);
  }

  function resetDateFilter() {
    document.getElementById("filterStartDate").value = "";
    document.getElementById("filterEndDate").value = "";
    filterHistory();

  function handleStatusChange(transactionId, newStatus, selectElement) {
    let tx = null;
    for (let i = 0; i < allTransactions.length; i++) {
      if (allTransactions[i].id === transactionId) {
        tx = allTransactions[i];
        break;
      }
    }
    if (!tx) return;
    if (
      newStatus.toLowerCase() === "diambil" &&
      tx.status_pembayaran !== "Lunas"
    ) {
      selectElement.value = tx.status;
      openPelunasanModal(transactionId);
      return;
    }
    updateStatus(transactionId, newStatus, selectElement, tx);
  }

  function openPelunasanModal(id) {
    let tx = null;
    for (let i = 0; i < allTransactions.length; i++) {
      if (allTransactions[i].id === id) {
        tx = allTransactions[i];
        break;
      }
    }
    if (!tx) return;
    pendingPelunasanId = id;
    document.getElementById("modalInputUang").value = "";
    document.getElementById("modalKembalian").innerText = "Rp 0";
    document.getElementById("payModalTagihan").innerText =
      "Rp " + parseInt(tx.total).toLocaleString("id-ID");
    let sisaTagihan = tx.total - (tx.terbayar || 0);
    document.getElementById("modalSisaTagihan").innerText =
      "Rp " + sisaTagihan.toLocaleString("id-ID");
    if (sisaTagihan < tx.total && sisaTagihan > 0) {
      document
        .getElementById("modalDPSisaContainer")
        .classList.remove("hidden");
    } else {
      document.getElementById("modalDPSisaContainer").classList.add("hidden");
    }

      .getElementById("modalSisaTagihan")
      .setAttribute("data-sisa", sisaTagihan);

    document.getElementById("modalCheckQRIS").checked = false;
    document.getElementById("modalCheckTransfer").checked = false;

    const content = document.getElementById("paymentModalContent");

    modal.classList.add("flex");
    setTimeout(() => {
      content.classList.remove("scale-95");

      if (inputUang) inputUang.focus();

  function setModalQuickAmount(val) {
    const sisa =
      parseInt(
        document.getElementById("modalSisaTagihan").getAttribute("data-sisa"),
      ) ||
      parseInt(
        document.getElementById("payModalTagihan").innerText.replace(/\./g, ""),

      document.getElementById("modalInputUang").value = sisa;

  function calcModalKembalian() {
    const sisa =
      parseInt(
        document.getElementById("modalSisaTagihan").getAttribute("data-sisa"),
      ) ||
      parseInt(
        document.getElementById("payModalTagihan").innerText.replace(/\./g, ""),
      ) ||
      0;
    const uang = parseInt(document.getElementById("modalInputUang").value) || 0;
    const kembalian = uang - sisa;
    document.getElementById("modalKembalian").innerText =
      kembalian < 0 ? "Rp 0" : "Rp " + kembalian.toLocaleString("id-ID");
  }

  // [UX] Generate quick amount buttons dinamis berdasarkan total tagihan
  function _generateQuickAmounts(total) {
    const container = document.querySelector(
      "#modalViewTunai .flex.flex-wrap.gap-1\\.5",
    );
    if (!container) return;
    // Hitung kelipatan yang relevan
    const denominations = [5000, 10000, 20000, 50000, 100000, 200000, 500000];
    const relevant = denominations.filter(
      (d) => d >= total * 0.3 && d <= total * 3,
    );
    // Selalu sertakan "Uang Pas" dan 2-3 kelipatan terdekat di atas total
    const above = denominations.filter((d) => d >= total).slice(0, 3);
    const combined = [...new Set([...relevant, ...above])]
      .sort((a, b) => a - b)
      .slice(0, 4);

    let html = `<button type="button" onclick="setModalQuickAmount('pas')"
      class="flex-1 min-w-[60px] bg-blue-600 hover:bg-blue-700 text-white text-[10px] font-bold py-2 rounded-lg transition-all active:scale-95 shadow-sm">
      Uang Pas
    </button>`;
    for (let i = 0; i < combined.length; i++) {
      const d = combined[i];
      const label = d >= 1000000 ? d / 1000000 + "jt" : d / 1000 + "rb";
      html += `<button type="button" onclick="setModalQuickAmount(${d})"
        class="flex-1 min-w-[60px] bg-white hover:bg-slate-50 text-slate-600 text-[10px] font-bold py-2 rounded-lg transition-all active:scale-95 border border-slate-200 shadow-sm">
        ${label}
      </button>`;
    }
    container.innerHTML = html;
  }
  function executePelunasan() {
    if (!pendingPelunasanId) return;
    const m = document.getElementById("modalPayMethod").value;
    if (m === "Tunai") {
      const sisa =
        parseInt(
          document.getElementById("modalSisaTagihan").getAttribute("data-sisa"),
        ) ||
        parseInt(
          document
            .getElementById("payModalTagihan")
            .innerText.replace(/\./g, ""),
        ) ||
        0;
      const uang =
        parseInt(document.getElementById("modalInputUang").value) || 0;
      if (uang < sisa) {
        showToast("Uang tunai kurang dari sisa tagihan!", "error");
        return;
      }
    } else if (m === "QRIS") {
      if (!document.getElementById("modalCheckQRIS").checked) {
        showToast("Ceklis verifikasi QRIS dahulu!", "error");
        return;
      }
    } else if (m === "Transfer") {
      if (!document.getElementById("modalCheckTransfer").checked) {
        showToast("Ceklis verifikasi Transfer dahulu!", "error");
        return;
      }
    }

    showLoading(true);
    google.script.run
      .withSuccessHandler(function (res) {
        showLoading(false);
        if (res.success) {
          showToast("Pembayaran Lunas & Diambil!");
          let tx = null;
          for (let i = 0; i < allTransactions.length; i++) {
            if (allTransactions[i].id === pendingPelunasanId) {
              tx = allTransactions[i];
              break;
            }
          }
          closePaymentModal();
          updateOverviewStats();
          loadTransactions(true);
          if (tx && tx.whatsapp && tx.whatsapp.toString().trim() !== "")
            showWaModal(tx, "DIAMBIL (LUNAS)");
        } else {
          showToast("Gagal menyimpan: " + res.message, "error");
        }
      })
      .withFailureHandler(function (err) {
        showLoading(false);
        showToast("Gagal simpan pelunasan: " + err.message, "error");
      })
      .lunasDanAmbil(currentUser.token, pendingPelunasanId, m);
  }

  // Normalisasi nomor WhatsApp ke format internasional (tanpa +)
  function normalizeWA(raw) {
    if (!raw) return "";
    // 1. Konversi ke string, strip semua karakter non-digit (spasi, strip, titik, kurung)
    let num = raw.toString().replace(/[^\d]/g, "").trim();
    if (!num) return "";
    // 2. Jika diawali '0' → ganti dengan '62'
    if (num.startsWith("0")) {
      num = "62" + num.substring(1);
    }
    // 3. Jika belum diawali '62' → tambahkan '62'
    else if (!num.startsWith("62")) {
      num = "62" + num;
    }
    return num;
  }

  function buildWaMessage(tx, statusNow) {
    let msg = appSettings.wa_template;
    msg = msg.replace(/\{customer\}/g, tx.customer);
    msg = msg.replace(/\{nota\}/g, tx.id);

    let paketStr = "";
    let beratStr = "";
    let satuanStr = "Kg";
    if (tx.items && tx.items.length > 0) {
      let pNames = [];
      let bNames = [];
      tx.items.forEach((i) => {
        pNames.push(i.paket);
        bNames.push(`${i.berat} ${i.satuan || "Kg"}`);
      });
      paketStr = pNames.join(", ");
      beratStr = bNames.join(", ");
      satuanStr = ""; // satuan sudah termasuk per-item, hindari double
    } else {
      paketStr = tx.paket;
      beratStr = tx.berat;
      satuanStr = tx.satuan || "Kg";
    }

    msg = msg.replace(/\{paket\}/g, paketStr);
    msg = msg.replace(/\{berat\}/g, beratStr);
    msg = msg.replace(/\{satuan\}/g, satuanStr);
    msg = msg.replace(/\{total\}/g, parseInt(tx.total).toLocaleString("id-ID"));
    msg = msg.replace(/\{status\}/g, statusNow.toUpperCase());
    msg = msg.replace(/\{nama_toko\}/g, appSettings.nota_title);
    msg = msg.replace(
      /\{status_pembayaran\}/g,
      tx.status_pembayaran.toUpperCase(),
    );
    msg = msg.replace(
      /\{terbayar\}/g,
      tx.terbayar ? parseInt(tx.terbayar).toLocaleString("id-ID") : "0",
    );
    msg = msg.replace(
      /\{sisa_tagihan\}/g,
      tx.terbayar
        ? (parseInt(tx.total) - parseInt(tx.terbayar)).toLocaleString("id-ID")
        : parseInt(tx.total).toLocaleString("id-ID"),
    );
    let estStr = "-";
    if (tx.estimasi) {
      const estD = new Date(tx.estimasi);
      if (!isNaN(estD))
        estStr = estD.toLocaleDateString("id-ID", {
          weekday: "long",
          day: "numeric",
          month: "long",
          year: "numeric",
        });
    }
    msg = msg.replace(/\{estimasi\}/g, estStr);
    msg = msg.replace(/\{catatan\}/g, tx.catatan || "-");
    return msg;
  }

  function updateStatus(transactionId, newStatus, selectElement, tx) {
    // Simpan status lama untuk rollback jika server gagal
    const oldStatus = tx ? tx.status : null;
    const oldClassName = selectElement.className;

    // Optimistic update — ubah UI dulu
    selectElement.className = `status-select text-[10px] font-bold px-3 py-1.5 rounded-lg border uppercase outline-none transition-colors shadow-sm ${getBadgeStyle(newStatus)}`;
    if (
      newStatus.toLowerCase() === "selesai" &&
      tx &&
      tx.whatsapp &&
      tx.whatsapp.toString().trim() !== ""
    )
      showWaModal(tx, newStatus);

    google.script.run
      .withSuccessHandler(function (res) {
        if (res.success) {
          showToast("Status diperbarui");
          if (tx) tx.status = newStatus;
          updateOverviewStats();
          setTimeout(function () {
            filterHistory();
          }, 1000);
        } else {
          // [P1] Rollback visual jika server gagal
          selectElement.className = oldClassName;
          if (oldStatus) selectElement.value = oldStatus;
          showToast("Gagal menyimpan status", "error");
        }
      })
      .withFailureHandler(function (err) {
        // [P1] Rollback visual jika koneksi gagal
        selectElement.className = oldClassName;
        if (oldStatus) selectElement.value = oldStatus;
        showToast("Gagal update status: " + err.message, "error");
      })
      .updateTransactionStatus(currentUser.token, transactionId, newStatus);
  }

  // 9. LOGIKA PEMBAYARAN SAAT TRANSAKSI BARU
  function toggleDPView() {
    const isChecked = document.getElementById("checkDP").checked;
    const dpInput = document.getElementById("dpInputContainer");
    if (isChecked) {
      dpInput.classList.remove("hidden");
    } else {
      dpInput.classList.add("hidden");
    }
    calcKembalian();
  }

  function togglePayView() {
    const v = document.getElementById("payMethod").value;
    document.getElementById("viewTunai").classList.add("hidden");
    document.getElementById("viewQRIS").classList.add("hidden");
    document.getElementById("viewTransfer").classList.add("hidden");
    document.getElementById("viewNanti").classList.add("hidden"); // [FIX] Sembunyikan viewNanti saat ganti metode
    if (v === "Tunai")
      document.getElementById("viewTunai").classList.remove("hidden");
    else if (v === "QRIS")
      document.getElementById("viewQRIS").classList.remove("hidden");
    else if (v === "Transfer")
      document.getElementById("viewTransfer").classList.remove("hidden");

    if (v === "Nanti") {
      document.getElementById("dpContainer").classList.add("hidden");
      document.getElementById("checkDP").checked = false;

      document.getElementById("viewNanti").classList.remove("hidden"); // [FIX] Bug viewNanti: tampilkan feedback visual saat "Bayar Nanti" dipilih

    }

  function handlePaketChange() {
    const s = document.getElementById("selectPaket");
    const opt = s.options[s.selectedIndex];
    if (!opt || opt.value === "") return;
    const satuan = opt.getAttribute("data-satuan") || "Kg";
    const durasi = parseInt(opt.getAttribute("data-durasi")) || 0;
    document.getElementById("labelBerat").innerText =
      `Jumlah / Berat (${escapeHTML(satuan)}) *`;
    const estDate = new Date();
    estDate.setDate(estDate.getDate() + durasi);
    const strEst = estDate.toLocaleDateString("id-ID", {
      weekday: "short",
      day: "numeric",
      month: "short",
    });
    const hint = document.getElementById("hintEstimasi");
    hint.innerText = `Estimasi Selesai: ${strEst}`;
    hint.classList.remove("hidden");
    calculateTotal();
  }

  let currentCart = [];

  // [P2] Validasi real-time input berat
  function validateBeratInput() {
    const bInput = document.getElementById("berat");
    const rawVal = bInput.value.replace(",", ".");
    const b = parseFloat(rawVal);
    if (bInput.value !== "" && (isNaN(b) || b <= 0)) {
      bInput.classList.add(
        "border-red-400",
        "bg-red-50",
        "focus:border-red-500",
        "focus:ring-red-100",
      );
      bInput.classList.remove("border-slate-200", "bg-slate-50");
    } else {
      bInput.classList.remove(
        "border-red-400",
        "bg-red-50",
        "focus:border-red-500",
        "focus:ring-red-100",
      );
      bInput.classList.add("border-slate-200", "bg-slate-50");
    }
    calculateTotal();
  }

  function addToCart() {
    const s = document.getElementById("selectPaket");
    const opt = s.options[s.selectedIndex];
    const bInput = document.getElementById("berat");
    const rawVal = bInput.value.replace(",", ".");
    const b = parseFloat(rawVal);

    // Highlight error visual jika tidak valid
    if (!opt || opt.value === "") {
      showToast("Pilih layanan terlebih dahulu!", "error");
      s.classList.add("border-red-400");
      setTimeout(() => s.classList.remove("border-red-400"), 2000);
      return;
    }
    if (isNaN(b) || b <= 0) {
      showToast("Masukkan jumlah yang valid!", "error");
      bInput.classList.add("border-red-400", "bg-red-50");
      bInput.focus();
      setTimeout(() => {
        bInput.classList.remove("border-red-400", "bg-red-50");
        bInput.classList.add("border-slate-200", "bg-slate-50");
      }, 2000);
      return;
    }

    const pkt = opt.value;
    const h = parseInt(opt.getAttribute("data-harga")) || 0;
    const sat = opt.getAttribute("data-satuan") || "Kg";
    const dur = parseInt(opt.getAttribute("data-durasi")) || 0;
    const pId = opt.getAttribute("data-id") || "";

    currentCart.push({
      id: pId,
      paket: pkt,
      berat: b,
      satuan: sat,
      harga: h,
      durasi: dur,
      subtotal: h * b,
    });

    bInput.value = "";
    bInput.classList.remove("border-red-400", "bg-red-50");
    bInput.classList.add("border-slate-200", "bg-slate-50");
    renderCart();
    calculateTotal();
    showToast(`${pkt} ditambahkan ke keranjang`);
  }

  function removeFromCart(index) {
    currentCart.splice(index, 1);
    renderCart();
    calculateTotal();
  }

  function renderCart() {
    const cartList = document.getElementById("cartList");
    const cartCount = document.getElementById("cartCount");
    cartCount.innerText = `${currentCart.length} Item`;

    if (currentCart.length === 0) {
      cartList.innerHTML = `<div class="text-center py-4 text-xs font-bold text-slate-400">Keranjang masih kosong</div>`;
      return;
    }

    let html = "";
    currentCart.forEach((item, index) => {
      html += `
            <div class="flex justify-between items-center bg-white p-3 rounded-lg border border-slate-100 shadow-sm">
                <div>
                    <p class="text-xs font-bold text-slate-800">${escapeHTML(item.paket)}</p>
                    <p class="text-[10px] font-semibold text-slate-500">${item.berat} ${escapeHTML(item.satuan)} x Rp ${item.harga.toLocaleString("id-ID")}</p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm font-black text-blue-600">Rp ${item.subtotal.toLocaleString("id-ID")}</span>
                    <button type="button" onclick="removeFromCart(${index})" class="text-slate-300 hover:text-red-500 transition-colors p-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                </div>
            </div>`;
    });
    cartList.innerHTML = html;

  function calculateTotal() {
    let subtotal = 0;
    currentCart.forEach((item) => {
      subtotal += item.subtotal;
    });

    document.getElementById("textSubtotal").innerText =
      subtotal.toLocaleString("id-ID");
    document.getElementById("totalHarga").innerText =
      subtotal.toLocaleString("id-ID");
    calcKembalian();
  }

  function setQuickAmount(val) {
    const total =
      parseInt(
        document.getElementById("totalHarga").innerText.replace(/\./g, ""),
      ) || 0;
    const isDP =
      document.getElementById("checkDP").checked &&
      document.getElementById("payMethod").value !== "Nanti";
    const dpAmount = parseInt(document.getElementById("inputDP").value) || 0;
    const tagihan = isDP ? dpAmount : total;
    if (val === "pas") {
      document.getElementById("inputUang").value = tagihan;
    } else {
      document.getElementById("inputUang").value = val;
    }
    calcKembalian();

    // [FIX] Toggle active state pada tombol quick amount
    const activeId = "qab-" + val;
    const allBtns = document.querySelectorAll(".quick-amount-btn");
    const inactiveClass = "bg-white hover:bg-slate-50 text-slate-700 border border-slate-200 shadow-sm";
    const activeClass = "bg-blue-600 hover:bg-blue-700 text-white border-blue-600 shadow-sm";
    for (let i = 0; i < allBtns.length; i++) {
      allBtns[i].className = "quick-amount-btn flex-1 min-w-[70px] text-[11px] font-bold py-2.5 rounded-lg transition-all active:scale-95 " +
        (allBtns[i].id === activeId ? activeClass : inactiveClass);
    }
  }

  function calcKembalian() {
    const total =
      parseInt(
        document.getElementById("totalHarga").innerText.replace(/\./g, ""),
      ) || 0;
    const isDP =
      document.getElementById("checkDP").checked &&
      document.getElementById("payMethod").value !== "Nanti";
    const dpAmount = parseInt(document.getElementById("inputDP").value) || 0;
    const uang = parseInt(document.getElementById("inputUang").value) || 0;
    const tagihan = isDP ? dpAmount : total;
    const kembalian = uang - tagihan;
    document.getElementById("textKembalian").innerText =
      kembalian < 0 ? "Rp 0" : "Rp " + kembalian.toLocaleString("id-ID");
  }

  function resetFormTransaksi() {
    document.getElementById("custName").value = "";
    document.getElementById("custWA").value = "";
    document.getElementById("berat").value = "";
    document.getElementById("selectPaket").selectedIndex = 0;
    document.getElementById("textSubtotal").innerText = "0";
    document.getElementById("totalHarga").innerText = "0";
    document.getElementById("hintEstimasi").classList.add("hidden");
    document.getElementById("inputUang").value = "";
    document.getElementById("textKembalian").innerText = "Rp 0";
    document.getElementById("checkQRIS").checked = false;
    document.getElementById("checkTransfer").checked = false;
